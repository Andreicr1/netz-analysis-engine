[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2"
healthcheckPath = "/api/v1/admin/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.envVars]
PYTHONUNBUFFERED = "1"
