name = "netz-workers"
main = "src/index.ts"
compatibility_date = "2025-12-01"

[[containers]]
class_name = "NetzWorkers"
image = "../../../Dockerfile"
max_instances = 1

[durable_objects]
bindings = [
  { name = "WORKERS_CONTAINER", class_name = "NetzWorkers" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NetzWorkers"]

[vars]
APP_ENV = "production"
FEATURE_R2_ENABLED = "true"
R2_ACCOUNT_ID = "a44ddf3ff0612bc0f62d1ee86f465ac9"
NETZ_WORKER_MODE = "true"

# Secrets: same as backend (see backend/wrangler.toml)
