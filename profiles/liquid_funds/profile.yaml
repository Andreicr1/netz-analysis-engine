# Liquid Funds DD Report Profile
# ==============================
# Defines the 7-chapter fund manager due diligence report structure.
# Engine reads this at runtime — zero wealth-specific assumptions in core pipeline.

name: liquid_funds
display_name: "Fund Manager Due Diligence Report"
version: 1

chapters:
  - id: ch01_executive
    title: "Executive Summary"
    type: ANALYTICAL
    max_tokens: 3000
    chunk_budget: [15, 3000]

  - id: ch02_strategy
    title: "Investment Strategy & Process"
    type: DESCRIPTIVE
    max_tokens: 4000
    chunk_budget: [20, 4000]

  - id: ch03_performance
    title: "Performance Analysis"
    type: ANALYTICAL
    max_tokens: 4000
    chunk_budget: [15, 3000]

  - id: ch04_risk
    title: "Risk Management Framework"
    type: ANALYTICAL
    max_tokens: 4000
    chunk_budget: [20, 4000]

  - id: ch05_operations
    title: "Operational Due Diligence"
    type: DESCRIPTIVE
    max_tokens: 4000
    chunk_budget: [25, 5000]

  - id: ch06_terms
    title: "Terms & Fees"
    type: DESCRIPTIVE
    max_tokens: 3000
    chunk_budget: [15, 3000]

  - id: ch07_recommendation
    title: "Recommendation"
    type: ANALYTICAL
    max_tokens: 3000
    chunk_budget: [0, 0]  # Synthesis-only, no evidence chunks

tone_normalization:
  descriptive_max_chars: 8000
  analytical_min_chars: 5000

recommendation_chapter: ch07_recommendation
