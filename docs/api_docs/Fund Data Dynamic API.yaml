        infoRatio1Yr:
          type: number
          description: >-
            The Information ratio of the fund share unit over a 1 yearperiod, to
            last month end. The information ratio measures the excess return and
            risk relative to a specific benchmark. It is essentially used to
            measure the performance of the mutual fund's active manager. Through
            the use of the information ratio, an investor can tell by how much
            the active manager could outperform the benchmark, and it also
            indicates the length of time that the active manager could
            outperform the benchmark. A low information ratio is a signal that a
            mutual fund is underperforming and should not be seen as a viable
            investment. A higher information ratio means that the active manager
            had a better ability to outperform the benchmark – and for a longer
            period of time Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcAnnRelReturns(unitdata, benchdata) /
            calcAnnRelTrackingError(unitreturns, benchreturns); logic is :1 year
            period
          format: double
        infoRatio3Yr:
