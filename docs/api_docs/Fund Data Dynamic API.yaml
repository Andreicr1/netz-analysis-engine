  /Analytics:
    get:
      tags:
        - Dynamic Data
      summary: >-
        Dynamic fund data including ratios and other analytics, such as Alpha,
        Beta, maximum drawdown, excess return and relative return over periods
        of 1, 3, and 5 years to date
      description: >
        Use this end point to fetch dynamic fund data including ratios and other
        analytics based on the identifierType like citicodes, isins and apirs.
      operationId: AnalyticsData
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes, isins and apirs.
          required: true
          style: form
          explode: true
          schema:
            type: string
            default: ''
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: currency
          in: query
          description: >-
            The ISO currency code to be used in the output, if the raw data
            needs to be exchanged or rebased from a base currency into this
            currency. Eg. "EUR". Default value is "Local" corresponds to the
            instrument currency.
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: Local
        - name: methodType
          in: query
          description: |
            Performace End Types:
             * `1` - BidToBid
             * `3` - OfferToBid
          required: false
          style: form
          explode: true
          schema:
            type: integer
            format: int32
            enum:
              - 1
              - 3
        - name: priceType
          in: query
          description: |
            Performace End Types:
             * `0` - Price
             * `1` - NetTotalReturn
             * `2` - GrossTotalReturn
             * `5` - Nav
             * `7` - NavPublished
             * `51` - UniverseDefault
          required: false
          style: form
          explode: true
          schema:
            type: integer
            format: int32
            enum:
              - 0
              - 1
              - 2
              - 5
              - 7
              - 51
        - name: riskFreeRate
          in: query
          description: >-
            A constant used in some correlation statistics to represent an
            interest rate that is considered be a gauge for risk free
          required: false
          style: form
          explode: true
          schema:
            type: string
        - name: isAnnualised
          in: query
          description: >-
            Whether or not performance/ratios should be calculated on an
            annualised basis for the instrument
          required: false
          style: form
          explode: true
          schema:
            type: boolean
        - name: benchmark
          in: query
          description: >-
            Defines whether the fund's index or sector should be used as the
            fund's benchmark in ratio calculation. True means the sector should
            be used, false means index should be used
          required: false
          style: form
          explode: true
          schema:
            type: boolean
      responses:
        '200':
          description: Get dynamic fund data including ratios and other analytics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_3'
        '206':
          description: >-
            Get dynamic fund data including ratios and other analytics. Partial
            Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_3'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this identifierValue.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Production:
            - dynamic-data-read
        - Sandbox:
            - dynamic-data-read
        - Development:
            - dynamic-data-read
