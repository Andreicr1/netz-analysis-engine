            total return divided by the benchmark’s total return) over a 1 year
            period, to last month end Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is :; logic is :1 year
            period
          format: double
        relativeReturn3Yr:
          type: number
          description: >-
            The factor to which the fund has out- or under-performed its
            benchmark index (calculated as the fund’s net asset value (NAV)
            total return divided by the benchmark’s total return) over a 3 year
            period, to last month end Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is :; logic is :3 year
            period
          format: double
        relativeReturn5Yr:
          type: number
          description: >-
            The factor to which the fund has out- or under-performed its
            benchmark index (calculated as the fund’s net asset value (NAV)
            total return divided by the benchmark’s total return) over a 5 year
            period, to last month end Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is :; logic is :5 year
            period
          format: double
        correlation1Yr:
          type: number
          description: >-
            Measures over 1 year  the degree to which two securities move in
