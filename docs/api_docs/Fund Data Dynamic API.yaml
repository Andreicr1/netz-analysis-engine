          type: string
        fundCode:
          type: string
          description: >-
            The FE internal identifier code for the instrument Table or function
            is : whUnits..FxUnit; dbField Name is :Citicode
        universeCode:
          type: string
          description: >-
            The code(s) assigned to identify the FE universe(s) of the fund.
            Table or function is : ; dbField Name is :; logic is :
        msciEsgFundRating:
          type: string
        issEsgFundRating:
          type: integer
          format: int32
        climetricsEsgFundRating:
          type: integer
          format: int32
        obsrRating:
          type: string
          description: >-
            Morningstar OBSR Analyst Ratings are assigned to funds on a
            five-tier scale running from Gold to Negative Table or function is :
            whUnits..OBSR_fundrating; dbField Name is :Rating
        ferApproved:
          type: string
          description: >-
            FE Approved fund that forms part of FE's own model portfolio Table
            or function is : whUnits..FER_Fund; dbField Name is :BuyRating;
            logic is :SELECT ferf.FundCode, BuyRating, ReportDate FROM
            [dbo].[FER_Fund] ferf WITH (NOLOCK) INNER JOIN (SELECT FundCode,
            Max(ReportDate) As MaxReportDate FROM [dbo].[FER_Fund] WITH (NOLOCK)
            GROUP BY FundCode) max ON ferf.FundCode = max.FundCode AND
            ferf.ReportDate = max.MaxReportDate
        crownRating:
          type: integer
          description: >-
            FE rating (1-5) for funds that are outperforming their benchmark
            Table or function is : whUnits..FxFundRating; dbField Name is
            :CrownRating
          format: int32
        alphaManagerRated:
          type: integer
          description: >-
            FE Alpha fund manager rating Table or function is :
            whUnits..FxUnitInSector; dbField Name is :IsCurrentMember; logic is
            :CASE WHEN s.IsCurrentMember = 1
          format: int32
        feRiskScore:
          type: number
          description: >-
            FE Risk Scores define risk as a measure of volatility relative to a
            specified index, which has a risk rating of 100. The Risk Score is
            relative to the locality where you are based so the FTSE 100 is used
            as the UK index. Instruments more volatile than the FTSE 100 have a
            score above 100 and instruments less volatile than the FTSE 100 have
            a score below 100. Table or function is : whUnits..FxRiskScore;
            dbField Name is :RiskScore
          format: double
        fePassiveRating:
          type: integer
          description: >-
            FE rating which awards passive funds between one and five P-Crowns,
            based on their ability to track their index Table or function is :
            whUnits..FxFundPassiveRating or whUnits..FxFundRating; dbField Name
            is :PassiveCrownRating; logic is :CASE WHEN
            ','+f.InvestmentStyle+',' LIKE '%,PSTK,%' THEN
            ISNULL(pr.PassiveCrownRating,r.PassiveCrownRating) END
          format: int32
        fEfundinfoRating:
          type: integer
          format: int32
        citicode:
          type: string
          description: >-
            The FE internal identifier code for the instrument Table or function
            is : whUnits..FxUnit; dbField Name is :Citicode
        squareMileRating:
          type: string
          description: >-
            Square Mile rating of funds which ranges from AAA(highest) to
            A(suspended) Table or function is : whUnits..SquareMileFundRating;
            dbField Name is :Rating
        sandPRating:
          type: string
          description: >-
            Standard & Poor rating Table or function is :
            whUnits..SandPFundRatings; dbField Name is :spManagementRating
        cityWireManagerRating:
          type: string
          description: ORDER BY Updated DESC
        srri:
          type: integer
          description: >-
            Synthetic risk and reward indicator. This indicator forms an
            integral part of the Key Investor Information Document (KIID) and
            gives the historical volatility of the fund unit price on a scale
            from 1 to 7 Table or function is : whUnits..FsUnit; dbField Name is
            :KiiRiskNumber
          format: int32
        esma:
          type: integer
          description: >-
            European Securities and Markets Authority rating Table or function
            is : NULL; dbField Name is :NULL
          format: int32
        fundSourceRating:
          type: integer
          description: >-
            A fund rating given by the company FundSource, based upon the
            modified Sharpe ratio Table or function is :
            whUnits..FundSourceStarRatings; dbField Name is :StarRating
          format: int32
        isAfiAggressive:
          type: integer
          description: >-
            The Adviser Fund Index (AFI) is made up of the recommended
            portfolios of a panel of leading UK financial advisers. The
            portfolios are spread across the AFI Aggressive, AFI Balanced and
            AFI Cautious and are available on FE Analytics as indices. Based
            entirely on the funds actually recommended to clients, the FE AFI
            index carries real-life credibility, providing insight into the
            benefits of holding top quality fundsFE Adviser Fund Index
            Aggressive Table or function is : whUnits..AFI_Member; dbField Name
            is :Portfolio; logic is :SELECT IsAfiAggressive = 1 FROM
            dbo.AFI_Member WHERE portfolio='A' and CitiCode=l.Code
          format: int32
        isAfiBalanced:
          type: integer
          description: >-
            The Adviser Fund Index (AFI) is made up of the recommended
            portfolios of a panel of leading UK financial advisers. The
            portfolios are spread across the AFI Aggressive, AFI Balanced and
            AFI Cautious and are available on FE Analytics as indices. Based
            entirely on the funds actually recommended to clients, the FE AFI
            index carries real-life credibility, providing insight into the
            benefits of holding top quality funds Table or function is :
            whUnits..AFI_Member; dbField Name is :Portfolio; logic is :SELECT
            IsAfiBalanced = 1 FROM dbo.AFI_Member WHERE portfolio='B' and
            CitiCode=l.Code
          format: int32
        isAfiCautious:
