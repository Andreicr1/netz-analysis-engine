        alpha1Yr:
          type: number
          description: >-
            The Alpha of the fund share unit over a 1 yearperiod, to last month
            end. Alpha is a measure of an investment's performance on a
            risk-adjusted basis. It takes the volatility (price risk) of a
            security or fund portfolio and compares its risk-adjusted
            performance to a benchmark index. The excess return of the
            investment relative to the return of the benchmark index is its
            alpha. Alpha is often considered to represent the value that a
            portfolio manager adds or subtracts from a fund portfolio's return.
            An alpha of 1.0 means the fund has outperformed its benchmark index
            by 1%. Correspondingly, an alpha of -1.0 would indicate an
            under-performance of 1% Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcAnnAlpha(unitreturns, benchreturns, beta); logic is :1 year
            period
          format: double
        alpha3Yr:
