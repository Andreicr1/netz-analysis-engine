            last month end. The Sortino ratio is a variation of the Sharpe ratio
            that differentiates harmful volatility from total overall volatility
            by using the asset's standard deviation of negative portfolio
            returns, called downside deviation, instead of the total standard
            deviation of portfolio returns. The Sortino ratio takes an asset or
            portfolio's return and subtracts the risk-free rate, and then
            divides that amount by the asset's downside deviation Table or
            function is : FE.Core - Business.Stats.AnalyticalTool; dbField Name
            is :calcSortino(annunitreturn, annUnitDownsideRisk); logic is :1
            year period
