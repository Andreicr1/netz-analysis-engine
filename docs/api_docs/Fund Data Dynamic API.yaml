  /Ratings:
    get:
      tags:
        - Dynamic Data
      summary: >-
        Fund and fund manager ratings, including Crown rating, Alpha Manager
        rating, risk score, SRRI and FE Adviser Fund Index flags
      description: >
        Use this end point to fetch dynamic fund and fund manager ratings based
        on the identifierType like citicodes, isins and apirs.
      operationId: RatingsData
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes, isins and apirs.
          required: true
          style: form
          explode: true
          schema:
            type: string
            default: ''
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: countryCode
          in: query
          description: >-
            The ISO 3166-1 alpha-3 code for the country for which risk score
            should be calculated
          required: false
          style: form
          explode: true
          schema:
            type: string
        - name: asAtDate
          in: query
          description: This date is applied to ESG related rating only
          required: false
          style: form
          explode: true
          schema:
            type: string
            format: date-time
