openapi: 3.0.0
info:
  title: Public Fund Data APIs - Dynamic Data
  description: >-
    Stay updated with real-time fund data using our Dynamic Data API, offering
    the latest fund prices and dividends.
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/funds/Dynamic/1.0.0
    description: Production
security:
  - Production: []
paths:
  /Dividends:
    get:
      tags:
        - Dynamic Data
      summary: >-
        Latest yield data, dividend frequency, and a history of fund dividend
        records.
      description: >
        Use this end point to fetch Divident Data based on the identifierType
        like citicodes, isin and apirs.
      operationId: FundDividendDataSimple
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes, isins and apirs.
          required: true
          style: form
          explode: true
          schema:
            type: string
            default: ''
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: DateFrom
          in: query
          required: true
          style: form
          explode: true
          schema:
            type: string
            format: date-time
        - name: DateTo
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: string
            format: date-time
        - name: Currencies
          in: query
          description: Value for currency. It will be default to GBP if nothing specified.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            default:
              - GBP
      responses:
        '200':
          description: Get Dividend Data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '206':
          description: Get Dividend Data. Partial Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this identifierValue.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Production:
            - dynamic-data-read
        - Sandbox:
            - dynamic-data-read
        - Development:
            - dynamic-data-read
    post:
      tags:
        - Dynamic Data
      summary: >-
        Latest yield data, dividend frequency, and a history of fund dividend
        records.
      description: >
        Use this end point to fetch Divident Data based on the identifierType
        like citicodes, isin and apirs.
      operationId: Post_FundDividendDataSimple
      parameters:
        - name: Fefi-Apim-Subscription-Key
