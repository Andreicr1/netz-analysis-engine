components:
  schemas:
    DividendData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/DividendData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/DividendDataResult'
    DividendDataResult:
      type: object
      properties:
        CitiCode:
          type: string
        Isin:
          type: string
        Apir:
          type: string
        OFDY005005:
          type: string
          description: The date a dividend is or was announced.
          format: date-time
        OFDY005010:
          type: string
          description: >-
            Date when dividend is deducted from share classes' net asset value,
            i.e. ceteris paribus the net asset value on Dividend Ex Date plus
            "OFDY005020 Dividend Gross" would equal the net asset value of the 
            day before.
          format: date-time
        OFDY005020:
          type: number
          description: >-
            Amount of dividend paid out, if no taxes would be deducted.
            Equivalent to  CEPT-PRICES: 11050_Distribution_value
          format: double
        OFDY005022:
          type: number
          description: >-
            Dividend paid out after withholding taxes are deducted. The net
            dividend must not be higher than the OFDY005020 Dividend Gross.
          format: double
        OFDY005015:
          type: number
          description: >-
            Date of the dividend payment, i.e. when you can expect the dividend
            amount transferred to your bank account.
          format: double
        OFDY900149:
          type: number
          description: >-
            Omitted dividend. Enter "yes" if this dividend is 0 - e.g. it has
            not been distributed.
          format: double
        OFDY005100:
          type: number
          description: Taxable Income per Dividend, shown as an amount per dividend.
          format: double
        OFDY005155:
          type: array
          description: >-
            Taxable income per share (TIS) for Belgium. The amount of income per
            share that is considered taxable for funds marketed in Belgium.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005160:
          type: array
          description: >-
            Taxable income per share (TIS) for Switzerland. The amount of income
            per share that is considered taxable for funds marketed in
            Switzerland.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005150:
          type: array
          description: >-
            Taxable income per share (TIS) for the European Union (EU). The
            amount of income per share that is considered taxable for funds
            marketed in the EU.
          items:
            $ref: '#/components/schemas/Pricing'
    Pricing:
      type: object
      properties:
        Value:
          type: number
          description: currency value
          format: double
        Currency:
          type: string
          description: currency format
    PricingData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/PricingData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/PricingDataResult'
    PricingDataResult:
      type: object
      properties:
        CitiCode:
          type: string
        Isin:
          type: string
        Apir:
          type: string
        OFDY000020:
          type: array
          description: >-
            For funds with "OFST401002 Pricing Methodology" = "dual pricing"
            only. Net asset value (NAV) of share class by using underlying
            assets' bid prices for NAV calculation. Default currency is
            "OFST020540 Share Class Currency". For different currencies use
            OFDY000020_XXX, where XXX stands for ISO code 4217 as it can be
            found on: https://en.wikipedia.org/wiki/ISO_4217 or on
            http://www.currency-iso.org/en/home/tables/table-a1.html
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY000025:
          type: array
          description: >-
            For funds with "OFST401002 Pricing Methodology" = "dual pricing"
            only. Net asset value (NAV) of share class by using underlying
            assets' ask prices for NAV calculation. Default currency is
            "OFST020540 Share Class Currency". For different currencies use
            OFDY000025_XXX, where XXX stands for ISO code 4217 as it can be
            found on https://en.wikipedia.org/wiki/ISO_4217 or on
            http://www.currency-iso.org/en/home/tables/table-a1.html.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY908005:
          type: array
          description: >-
            FE fundinfo Mid. Decimal figure, rounded to maximal 7 digits after
            the decimal point.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY908102:
          type: array
          description: >-
            FE fundinfo Total Return NAV. Decimal figure, rounded to maximal 7
            digits after the decimal point.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY907001:
          type: array
          description: >-
            This field is to indicate the Ausgabepreis (subscription price) used
            in Germany. The subscription price of a fund refers to the price at
            which investors can buy shares or units in the fund. It is the
            initial price per share or unit that investors pay to enter the fund
            and may also include additional fees or charges, such as sales
            charges or front-end loads, which are deducted from the investor's
            initial investment.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY907003:
          type: array
          description: >-
            This field is to indicate the Rücknahmepreis (redemption price) used
            in Germany. The redemption price refers to the price at which
            investors can sell their shares or units in the fund. It represents
            the value of the investor's holdings at the time of redemption and
            may include additional fees or charges, such as redemption fees or
            back-end loads, which are deducted from the investor's proceeds upon
            sale.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY028010:
          type: array
          description: >-
            The equity participation ratio as per item 28 of the letter of the
            Ministry of Finance in connection with the letter of the Ministry of
            Finance of 14 June 2017 (Reference: IV C 1 – p. 1980-1/16/10010
            :001). By taking this value into account, a fund of funds can
            acquire the status of an equity fund entitled to partial tax
            exemption on shares in favor of its investors. German: Höhe der
            Kapitalbeteiligungsquote. This field is relevant for Retail
            Investment Funds and Special Investment Funds distributed in
            Germany.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY028012:
          type: array
          description: >-
            This indicates the proportion of the total fund assets in the share
            class. This is required to calculate tax deductions from the taxable
            investment income. The relevant date for this value should be the
            valuation date given alongside this, e.g. OFDY000021 Bid NAV Date.
            German: Anteil am Gesamtfondsvermögen. This field is relevant for
            Retail Investment Funds and Special Investment Funds distributed in
            Germany.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY028018:
          type: array
          description: >-
            The real estate ratio (non-German real estates) as per item 2.14 of
            the (draft) letter of the Federal Ministry of Finance of August 2017
            "Letter of Application of the Investment Tax Law in the Version of
            the Law Governing the Reform of the Investment Taxation" in
            connection with the letter of the Ministry of Finance of 14 June
            2017. German: Ausländische Immobilienquote. This field is relevant
            for Retail Investment Funds and Special Investment Funds distributed
            in Germany.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900150:
          type: array
          description: >-
            The amount of shares subscribed refers to the total value of shares
            or units that investors have agreed to purchase in a financial
            product, such as a fund or security, during the NAV calculation
            period. This metric represents the level of demand for the product
            and is shown in the currency of the share class. Calculated using
            Price x Number of subscribed shares.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900151:
          type: array
          description: >-
            The amount of redeemed shares refers to the total value of shares or
            units that investors have sold back to a financial product, such as
            a fund or security, during the NAV calculation period. This metric
            represents the level of investor disinterest or need for liquidity
            in the product and is shown in the currency of the share class.
            Calculated using Price x Number of redeemed shares.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900152:
          type: array
          description: >-
            The number of subscribed shares refers to the total count of shares
            or units that have been purchased by investors in a financial
            product, such as a fund or security, during the NAV calculation
            period. This metric represents the level of investor interest in the
            product.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900153:
          type: array
          description: >-
            The number of redeemed shares refers to the total count of shares or
            units that have been sold back by investors to a financial product,
            such as a fund or security, during the NAV calculation period. This
            metric represents the level of investor disinterest or need for
            liquidity in the product.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900154:
          type: array
          description: >-
            The amount of subscriptions inside sub-fund refers to the total
            value of shares or units that investors have purchased within a
            specific sub-fund of a larger financial product, such as a mutual
            fund or exchange-traded fund (ETF), during the NAV calculation
            period. This metric represents the level of investor interest and
            participation in the sub-fund and is shown in the currency of the
            sub-fund.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900155:
          type: array
          description: >-
            The amount in redemptions inside sub-fund refers to the total value
            of shares or units that investors have sold back within a specific
            sub-fund of a larger financial product, such as a mutual fund or
            exchange-traded fund (ETF), during NAV calculation period. This
            metric represents the level of investor disinterest or need for
            liquidity in the sub-fund and is shown in the currency of the
            sub-fund.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900156:
          type: array
          description: >-
            The number of subscribed shares in sub-fund refers to the total
            count of shares or units that have been purchased by investors
            within a specific sub-fund of a larger financial product, such as a
            mutual fund or exchange-traded fund (ETF), during the NAV
            calculation period. This metric represents the level of investor
            interest and participation in the sub-fund.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900157:
          type: array
          description: >-
            The number of redeemed shares in sub-fund refers to the total count
            of shares or units that have been sold back by investors within a
            specific sub-fund of a larger financial product, such as a mutual
            fund or exchange-traded fund (ETF), during the NAV calculation
            period. This metric represents the level of investor disinterest or
            need for liquidity in the sub-fund.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005155:
          type: array
          description: >-
            Taxable income per share (TIS) for Belgium. The amount of income per
            share that is considered taxable for funds marketed in Belgium.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005160:
          type: array
          description: >-
            Taxable income per share (TIS) for Switzerland. The amount of income
            per share that is considered taxable for funds marketed in
            Switzerland.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005150:
          type: array
          description: >-
            Taxable income per share (TIS) for the European Union (EU). The
            amount of income per share that is considered taxable for funds
            marketed in the EU.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY005100:
          type: array
          description: Taxable Income per Dividend, shown as an amount per dividend.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900149:
          type: array
          description: >-
            Omitted dividend. Enter "yes" if this dividend is 0 - e.g. it has
            not been distributed.
          items:
            $ref: '#/components/schemas/Pricing'
        OFDY900141:
          type: number
          description: The Gross Total Return value of Bid.
          format: double
        OFDY900142:
          type: number
          description: The Gross Total Return value of Offer.
          format: double
        OFDY900143:
          type: number
          description: The Total Return value of Bid.
          format: double
        OFDY900144:
          type: number
          description: The Total Return value of Offer.
          format: double
        OFDY000021:
          type: string
          description: Valuation date.
          format: date-time
        OFDY000026:
          type: string
          description: Valuation date.
          format: date-time
        OFDY000036:
          type: string
          description: Valuation date.
          format: date-time
        OFDY000041:
          type: string
          description: Valuation date.
          format: date-time
        OFDY000066:
          type: string
          description: Number Of Shares Amount Fund
          format: date-time
        OFDY000075:
          type: string
          description: Number Of Shares Amount Unit
          format: date-time
        OFDY000076:
          type: string
          description: Number Of Shares Date Unit
          format: date-time
        OFDY000065:
          type: string
          description: Number Of Shares Date Fund
          format: date-time
        PriceChangePercentage:
          type: number
          description: Price change in percentage compared to the previous price.
          format: double
    AumOnData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/AumOnData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/AumOnDataResult'
    AumOnDataResult:
      type: object
      properties:
        CitiCode:
          type: string
        Isin:
          type: string
        Apir:
          type: string
        OFDY000060:
          type: number
          description: >
            Also known as "Total Net Assets" (TNA) The overall value of the
            fund's assets Table or function is : whUnits..FundFact; dbField Name
            is :FundSize (with exchange rate); logic is :ff.FundSize *
            IsNUll(ex.ExchangeRate, 1)
          format: double
        OFDY000061:
          type: string
          description: >
            The date at which the fund size was calculated. See "FundSize" for
            more details on fund size Table or function is : whUnits..FundFact;
            dbField Name is :FundSizeDate
          format: date-time
        OFDY000070:
          type: number
          description: >
            Also known as "Unit Total Net Assets" (Unit TNA). The value of the
            proportion of the fund's assets allocated to a given unit Table or
            function is : whUnits..FxUnit; dbField Name is :UnitSize (with
            exchange rate); logic is :u.UnitSize * IsNull(ex.ExchangeRate, 1)
          format: double
        OFDY000071:
          type: string
          description: >
            The date at which the unit size was calculated. See "Unit Size" for
            more details on unit size Table or function is : whUnits..FxUnit;
            dbField Name is :UnitSizeDate
          format: date-time
    AnalyticsData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/AnalyticsData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/AnalyticsDataResult'
    AnalyticsDataResult:
      type: object
      properties:
        Isin:
          type: string
        Apir:
          type: string
        citiCode:
          type: string
          description: >-
            The FE internal identifier code for the instrument Table or function
            is : whUnits..FxUnit; dbField Name is :Citicode
        bearBeta1Yr:
          type: number
          description: >-
            The Bear Beta coefficient of the fund share unit over a 1
            yearperiod, to last month end. Bear Beta is a measure of the
            sensitivity of a fund’s return to negative changes in its
            benchmark’s return Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcBearBeta(unitreturns, benchreturns); logic is :1 year period
          format: double
        bearBeta3Yr:
          type: number
          description: >-
            The Bear Beta coefficient of the fund share unit over a 3
            yearperiod, to last month end. Bear Beta is a measure of the
            sensitivity of a fund’s return to negative changes in its
            benchmark’s return Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcBearBeta(unitreturns, benchreturns); logic is :3 year period
          format: double
        bearBeta5Yr:
          type: number
          description: >-
            The Bear Beta coefficient of the fund share unit over a 5
            yearperiod, to last month end. Bear Beta is a measure of the
            sensitivity of a fund’s return to negative changes in its
            benchmark’s return Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcBearBeta(unitreturns, benchreturns); logic is :5 year period
          format: double
        maxDrawdown1Yr:
          type: number
          description: >-
