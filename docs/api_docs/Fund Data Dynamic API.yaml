          description: >-
            The Beta coefficient of the fund share unit over a 1 yearperiod, to
            last month end. Beta, also known as the beta coefficient, is a
            measure of the volatility, or systematic risk, of a security or a
            portfolio compared to the market as a whole. Beta is calculated
            using regression analysis and it represents the tendency of an
            investment's return to respond to movements in the market. By
            definition, the market has a beta of 1.0. Individual security and
            portfolio values are measured according to how they deviate from the
            market Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcBeta(unitreturns, benchreturns); logic is :1 year period
          format: double
