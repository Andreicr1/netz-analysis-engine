    PostAnalyticsDataRequestBody_Filters:
      type: object
      properties:
        currency:
          type: string
          description: >-
            The ISO currency code to be used in the output, if the raw data
            needs to be exchanged or rebased from a base currency into this
            currency. Eg. "EUR". Default value is "Local" corresponds to the
            instrument currency.
          default: Local
        methodType:
          type: integer
          description: |
            Performace End Types:
             * `1` - BidToBid
             * `3` - OfferToBid
          format: int32
          enum:
            - 1
            - 3
        priceType:
          type: integer
          description: |
            Performace End Types:
             * `0` - Price
             * `1` - NetTotalReturn
             * `2` - GrossTotalReturn
             * `5` - Nav
             * `7` - NavPublished
             * `51` - UniverseDefault
          format: int32
          enum:
            - 0
            - 1
            - 2
            - 5
            - 7
            - 51
        riskFreeRate:
          type: string
          description: >-
            A constant used in some correlation statistics to represent an
            interest rate that is considered be a gauge for risk free
        isAnnualised:
          type: boolean
          description: >-
            Whether or not performance/ratios should be calculated on an
            annualised basis for the instrument
        benchmark:
          type: boolean
          description: >-
            Defines whether the fund's index or sector should be used as the
            fund's benchmark in ratio calculation. True means the sector should
            be used, false means index should be used
    PostRatingsDataRequestBody_Filters:
      type: object
      properties:
        countryCode:
          type: string
          description: >-
            The ISO 3166-1 alpha-3 code for the country for which risk score
            should be calculated.
        asAtDate:
          type: string
          description: This date is applied to ESG related rating only
          format: date-time
        usingUniverseUAsDefault:
          type: boolean
    PostIntraDayPriceDataRequestBody_Filters:
      type: object
      properties:
        Currencies:
          type: array
          description: Value for currency. It will be default to GBP if nothing specified.
          items:
            type: string
            description: currency value.
          default:
            - GBP
