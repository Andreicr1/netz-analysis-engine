        jensensAlpha1Yr:
          type: number
          description: >-
            The Jensen's Alpha of the portfolio over a 1 yearperiod, to last
            month end. The Jensen's Alpha is a risk-adjusted performance measure
            that represents the average return on a portfolio or investment,
            above or below that predicted by the capital asset pricing model
            (CAPM), given the portfolio's or investment's beta and the average
            market return. This metric is also commonly referred to as Jensen's
            measure, or simply alpha Table or function is : FE.Core -
            Business.Stats.AnalyticalTool; dbField Name is
            :calcJensensAlpha(HistData x, HistData y, double beta); logic is :1
            year period
          format: double
