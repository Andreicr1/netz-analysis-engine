          description: >-
            The Sharpe ratio of the fund share unit over a 1 yearperiod, to last
            month end. The Sharpe ratio measures risk-adjusted performance. It
            is calculated by subtracting the risk-free rate of return from the
            rate of return for an investment and dividing the result by the
            investment's standard deviation of its return. The Sharpe ratio
            tells investors whether an investment's returns are due to wise
            investment decisions or the result of excess risk Table or function
            is : FE.Core - Business.Stats.AnalyticalTool; dbField Name is
            :calcMSharpe(annunitreturn - m_Rf, unitvol); logic is :1 year period
          format: double
