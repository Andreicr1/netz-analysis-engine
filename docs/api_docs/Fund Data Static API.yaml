      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFST405521:
          type: string
          description: >-
            The length of the revolving time period within that one or more
            subscriptions can be executed. More information about trade cycles
            can be obtained by downloading the whitepaper at
            https://www.openfunds.org/en/trade-cycle.
              To indicate a mix of different trade cycle periods (=multiple trade cycles) choose "combined" and refer to the whitepaper at "https://www.openfunds.org/en/trade-cycle" how to fill out the relevant field, i.e. "OFST405530 Dates Of Multiple Subscription Trade Cycles".
        OFST405525:
          type: string
          description: >-
            This field specifies the dates within the selected period. For a
            weekly period (OFST405521 Subscription Trade Cycle Period "weekly")
            you can choose one or more weekdays or the first or last business
            day of the week. In general, there is a difference between "1st
            business day" / weekdays and "last business day". For instance,
            "last business day" would shift Friday to Thursday and the value
            "Fr" would shift Friday to Monday in case Friday is a banking
            holiday.
              If weekly subscriptions are possible on more than one weekday within the week (OFST405563 Number Of Possible Subscriptions Within Period > 1), you should combine these values by using a pipe "|" (ASCII 124). You can
              combine any weekday with another weekday and also the two values “1st business
              day” and “last business day”. However, you should not combine a weekday with one
              of the two values “1st business day” or “last business day” as this might lead to contradictory values.
              In case of irregular subscription dealing days please use the field "OFST405532 Irregular Subscription Dealing Days".
              More information about trade cycles can be obtained by downloading the whitepaper at https://www.openfunds.org/en/trade-cycle
        OFST405526:
          type: string
          description: >-
            This field specifies the dates within the selected period. A monthly
            period (OFST405521 Subscription Trade Cycle Period = "monthly")
            consists of two terms. Term a) represents a number, term b) a day.
            You can choose one or more days during a month. You can choose from
            any meaningful combination of a number (e.g., "1st", "2nd", … "31st"
            or "last") and a day (e.g., "calendar day", "business day", "Su",
            "Mo", Tu", etc.) like "last Fr". If monthly subscriptions are
            possible on more than one day within the month (OFST405523 Number Of
            Possible Subscriptions Within Period > 1), you should combine these
            values by using a pipe "|" (ASCII 124). For instance, "15th calendar
            day|last business day". In case of irregular subscription trade
            dealing days, please use the field "OFST405532 Irregular
            Subscription Dealing Days". More information about trade cycles can
            be obtained by downloading the whitepaper at
            https://www.openfunds.org/en/trade-cycle.
        OFST405528:
          type: string
          description: >-
            This field specifies the dates within the selected period. A yearly
            period (OFST405521 Subscription Trade Cycle Period = "yearly")
            consists of three Terms. Term a) represents a number, term b) a day,
            and term c) a month. You can choose one or more dates. To do so, you
            can choose any meaningful combination of a number (e.g., "1st",
            "2nd", … "31st" or "last"), a day (e.g., "calendar day", "business
            day", "Su", "Mo", Tu", etc.), and month (e.g., "Jan", "Feb", "Mar",
            etc.) like "last Fr Jun". If yearly subscriptions are possible on
            more than one day within the year (OFST405523 Number Of Possible
            Subscriptions Within Period > 1), you should combine these values by
            using a pipe "|" (ASCII 124). For instance, "last business day
            Jun|15th calendar day Dec". In case of irregular subscription trade
            dealing days, please use the field "OFST405532 Irregular
            Subscription Dealing Days". More information about trade cycles can
            be obtained by downloading the whitepaper at
            https://www.openfunds.org/en/trade-cycle.
        OFST405530:
          type: string
          description: >-
            Depending on the period (weekly, monthly, yearly), please use the
            same values as described in "OFST405525 Weekly Subscription Dealing
            Days", "OFST405526 Monthly Subscription Dealing Days", "OFST405528
            Yearly Subscription Dealing Days" or "OFST405532 Irregular
            Subscription Dealing Days". To separate different cycles, just
            separate them by a pipe “|” (ASCII 124). More information about
            trade cycles can be obtained by downloading the whitepaper at
            https://www.openfunds.org/en/trade-cycle.
        OFST405532:
          type: string
          description: >-
            This field is a free format text field to indicate irregular trade
            cycles not covered by the fields "OFST405525 Weekly Subscription
            Dealing Days",  "OFST405526 Monthly Subscription Dealing Days", and
            "OFST405528 Yearly Subscription Dealing Days". 
             For instance, "6th last business day".
        OFST410070:
          type: string
          description: >-
            The Calculation Date Offset is defined as the difference in days
            between the closing/valuation date for the trade and the date on
            which the valuation is calculated.  The closing date is the date on
            which the prices of underlying holdings are determined. This field
            shows the offset for subscription trades. For redemptions, please
            use OFST410075 Calculation Date Offset for Redemption, even if the
            value is the same as that in this field.
        OFST410500:
          type: string
          description: Is there a pre-payment period for the subscription?
        OFST410600:
          type: string
          description: >-
            Number of days before the NAV date. Please choose calendar or
            business days in field "OFST430200 Calendar Or Business Days For
            Transactions".
        OFST410650:
          type: string
          description: >-
            When, i.e., before what time is the pre-payment due. Additionally,
            mention the appropriate time zone in field "OFST410090 Time Zone For
            Cut-off" or "OFST410092 Time Zone For Cut-off Using TZ Database".
        OFST410954:
          type: string
          description: >-
            If the fund has a lock-up period for early redemption, the length of
            this period in days.
        OFST415500:
          type: string
          description: >-
            Is there a required pre-notice for switch in? Typically used by
            hedge funds,  but not very common for mutual funds. The Switch In
            Notice Period (OFST415510) specifies how many days in advance
            investors have to notify that they wish to subscribe to a fund. If
            this field is filled with "yes",  please provide the respective data
            in the field "OFST415510 Switch In Notice Period". If there is no
            pre-notice for switch in required, please fill this field with "no"
            and leave the field "OFST415510 Switch In Notice Period" empty.
        OFST415510:
          type: string
          description: >-
            How many days are needed to trade a switch in this share class?  The
            Switch In Notice Period specifies how many days in advance investors
            have to notify that they wish to switch in to a fund.  Please choose
            calendar or business days in field "OFST430200 Calendar Or Business
            Days For Transactions".
        OFST420100:
          type: string
          description: >-
            Provider cut-off time (deadline for the switch in order placement)
            [hh:mm].  Additionally, mention the appropriate time zone in field
            "OFST410090 Time Zone For Cut-off" or "OFST410092 Time Zone For
            Cut-off Using TZ Database".
        OFST420220:
          type: string
          description: >-
            If redemptions have to be done in shares, what is the minimal number
            of shares for redemption?
        OFST420225:
          type: string
          description: >-
            If redemptions have to be done in shares, what is the maximum
            initial number of shares allowed for redemption?
        OFST420230:
          type: string
          description: >-
            If redemptions are in currency, what is the minimal initial amount
            for redemptions in the mentioned currency?  Please indicate the
            currency in field "OFST420240 Currency Of Minimal Redemption".
        OFST420235:
          type: string
          description: >-
            If redemptions are in currency, what is the maximum initial amount
            of allowed redemptions in the mentioned currency?  Please indicate
            the currency in field "OFST420240 Currency Of Minimal Redemption".
        OFST425572:
          type: string
          description: >-
            This field is a free format text field to indicate irregular trade
            cycles not covered by the fields "OFST425565 Weekly Redemption
            Dealing Days",  "OFST425566 Monthly Redemption Dealing Days", and
            "OFST425568 Yearly Redemption Dealing Days". For instance, "6st last
            business day".
        OFST425600:
          type: string
          description: >-
            Pre-notice cut-off time for redemptions. Additionally, mention the
            appropriate time zone in field "OFST410090 Time Zone For Cut-off" or
            "OFST410092 Time Zone For Cut-off Using TZ Database".
        OFST430100:
          type: string
          description: >-
            Provider cut-off time (deadline order placement) [hh:mm]. 
            Additionally, mention the appropriate time zone in field "OFST410090
            Time Zone For Cut-off" or "OFST410092 Time Zone For Cut-off Using TZ
            Database".
        OFST435500:
          type: string
          description: >-
            Is there a required pre-notice for switch out? Typically used by
            hedge funds, but not very common for mutual funds.  The Switch Out
            Notice Period (OFST435550) specifies how many days in advance
            investors have to notify that they wish to switch out from a fund. 
            If this field is filled with "yes", please provide the respective
            data in the field "OFST435550 Switch Out Notice Period".  If there
            is no pre-notice for switch out required, please fill this field
            with "no" and leave the field "OFST435550 Switch Out Notice Period"
            empty.
        OFST435550:
          type: string
          description: >-
            How many days are needed to trade a switch out of this share class? 
            The Switch Out Notice Period specifies how many days in advance
            investors have to notify that they wish to switch out from a fund. 
            Please choose calendar or business days in field "OFST430200
            Calendar Or Business Days For Transactions".
        OFST440100:
          type: string
          description: >-
            Provider cut-off time (deadline for the switch out order placement)
            [hh:mm].  Additionally, mention the appropriate time zone in field
            "OFST410090 Time Zone For Cut-off" or "OFST410092 Time Zone For
            Cut-off Using TZ Database".
