openapi: 3.0.0
info:
  title: Public Fund Data APIs - Static Data
  description: >-
    Access details such as fund registration, purchase information and other
    data categorized as static by Openfunds.
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/funds/Static/1.0.0
    description: Production
security:
  - Production: []
paths:
  /Fees:
    get:
      tags:
        - Static Data
      summary: Static fees related data
      description: >
        Use this end point to fetch static query data based on the
        identifierType like citicodes, isins and apirs.
      operationId: GetFundFeesData
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes, isins and apirs.
          required: true
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: Get static fees data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '206':
          description: Get static fees data. Partial Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this identifierValue.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Production:
            - static-data-read
        - Sandbox:
            - static-data-read
        - Development:
            - static-data-read
    post:
      tags:
