    SwissClimateScoreDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFST820100:
          type: string
          description: >-
            The currency used for climate data currency fields (those fields in
            the range OFST820000-OFST849999 where a currency value is relevant).
        OFST820110:
          type: string
          description: >-
            Portfolio’s exposure to carbon-intensive companies for Greenhouse
            Gas Protocol’s (GHG) scope 1 and 2 emissions.  Refer to SFDR RTS
            Annex I for calculation formula. Expressed in tons CO2e / M revenue,
            using the currency from OFST820100 Climate Data Currency.
        OFST820120:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Weighted Average Carbon
            Intensity GHG Scope 1 and 2.
        OFST820130:
          type: string
          description: >-
            Portfolio’s exposure to carbon-intensive companies for Greenhouse
            Gas Protocol’s (GHG) scope 3 emissions.  Refer to SFDR RTS Annex I
            for calculation formula. Expressed in tons CO2e / M revenue, using
            the currency from OFST820100 Climate Data Currency.
        OFST820140:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Weighted Average Carbon
            Intensity GHG Scope 3.
        OFST820150:
          type: string
          description: >-
            Portfolio’s exposure to carbon-intensive companies for Greenhouse
            Gas Protocol’s (GHG) total emissions for all scopes.  Refer to SFDR
            RTS Annex I for calculation formula. Expressed in tons CO2e / M
            revenue, using the currency from OFST820100 Climate Data Currency.
        OFST820160:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Weighted Average Carbon
            Intensity GHG Total.
        OFST820170:
          type: string
          description: >-
            Total carbon emissions for a portfolio normalized by the market
            value of the portfolio, for Greenhouse Gas Protocol’s (GHG) scope 1
            emissions.  Expressed in tons CO2e / M invested, using the currency
            from OFST820100 Climate Data Currency.
        OFST820180:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Carbon Footprint GHG
            Scope 1.
        OFST820190:
          type: string
          description: >-
            Total carbon emissions for a portfolio normalized by the market
            value of the portfolio, for Greenhouse Gas Protocol’s (GHG) scope 2
            emissions.  Expressed in tons CO2e / M invested, using the currency
            from OFST820100 Climate Data Currency.
        OFST820200:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Carbon Footprint GHG
            Scope 2.
        OFST820210:
          type: string
          description: >-
            Total carbon emissions for a portfolio normalized by the market
            value of the portfolio, for Greenhouse Gas Protocol’s (GHG) scope 3
            emissions.  Expressed in tons CO2e / M invested, using the currency
            from OFST820100 Climate Data Currency.
        OFST820220:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Carbon Footprint GHG
            Scope 3.
        OFST820230:
          type: string
          description: >-
            Absolute greenhouse gas emissions associated with a portfolio, for
            Greenhouse Gas Protocol’s (GHG) scope 1 and 2 emissions. Expressed
            in tons CO2e.
        OFST820240:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Absolute Greenhouse Gas
            Emissions GHG Scope 1 and 2.
        OFST820250:
          type: string
          description: >-
            Absolute greenhouse gas emissions associated with a portfolio, for
            Greenhouse Gas Protocol’s (GHG) scope 3 emissions. Expressed in tons
            CO2e.
        OFST820260:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Absolute Greenhouse Gas
            Emissions GHG Scope 3.
        OFST820270:
          type: string
          description: >-
            Absolute greenhouse gas emissions associated with a portfolio, for
            Greenhouse Gas Protocol’s (GHG) total emissions. Expressed in tons
            CO2e.
        OFST820280:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Absolute Greenhouse Gas
            Emissions GHG Total.
        OFST820290:
          type: string
          description: >-
            Share of companies in portfolio with activities in coal as a
            percentage figure.  The scope of activities includes the whole value
            chain, ranging from exploration, extraction, and production
            (upstream) to transportation and storage (midstream) and refining,
            marketing, and electrification (downstream).  Revenue threshold for
            inclusion 0%.
        OFST820300:
          type: string
          description: >-
            Share of companies in portfolio with activities in coal as a
            percentage figure.  The scope of activities includes the whole value
            chain, ranging from exploration, extraction, and production
            (upstream) to transportation and storage (midstream) and refining,
            marketing, and electrification (downstream).  Revenue threshold for
            inclusion 5%.
        OFST820310:
          type: string
          description: >-
            Share of companies in portfolio with activities in coal as a
            percentage figure.  The scope of activities includes the whole value
            chain, ranging from exploration, extraction, and production
            (upstream) to transportation and storage (midstream) and refining,
            marketing, and electrification (downstream).  Revenue threshold for
            inclusion 10%.
        OFST820320:
          type: string
          description: >-
            Percentage of Portfolio assets covered for Share Of Investments Into
            Companies With Activities In Coal.
        OFST820330:
          type: string
          description: >-
            Share of companies in portfolio with activities in other fossil
            fuels as a percentage figure.  The scope of activities includes the
            whole value chain, ranging from exploration, extraction, and
            production (upstream) to transportation and storage (midstream) and
            refining, marketing, and electrification (downstream).  Other fossil
            fuel based revenues are revenues generated by oil and gas
            activities. Revenue threshold for inclusion 0%.
        OFST820340:
          type: string
          description: >-
            Share of companies in portfolio with activities in other fossil
            fuels as a percentage figure.  The scope of activities includes the
            whole value chain, ranging from exploration, extraction, and
            production (upstream) to transportation and storage (midstream) and
            refining, marketing, and electrification (downstream).  Other fossil
            fuel based revenues are revenues generated by oil and gas
            activities.  Revenue threshold for inclusion 5%.
        OFST820350:
          type: string
          description: >-
            Share of companies in portfolio with activities in other fossil
            fuels as a percentage figure.  The scope of activities includes the
            whole value chain, ranging from exploration, extraction, and
            production (upstream) to transportation and storage (midstream) and
            refining, marketing, and electrification (downstream).  Other fossil
            fuel based revenues are revenues generated by oil and gas
            activities.  Revenue threshold for inclusion 10%.
        OFST820360:
          type: string
          description: >-
            Percentage of Portfolio assets covered Share Of Investments Into
            Companies With Other Fossil Fuel Activities.
        OFST820370:
          type: string
          description: >-
            The share of companies in portfolio with verified commitments as a
            percentage figure.  Companies with a publicly communicated pledge to
            reach net zero and have near-term targets be certified by
            Science-based Targets initiative (SBTi).  The share of companies in
            portfolio with verified commitments should be understood as the
            share of assets invested in companies with verified commitments. 
            Current value of assets in portfolio should be included in full from
            the moment the company has publicly communicated a pledge to
            Net-Zero and has a certified Near-term target.
        OFST820380:
          type: string
          description: >-
            Percentage of Portfolio assets covered for the Share of companies in
            portfolio with verified commitments to NZ and credible interim
            targets.
        OFST820390:
          type: string
          description: >-
            A temperature score in °C that describes the most likely global
            warming outcome if the global economy was to exhibit the same level
            of ambition as the counterparty in question.  (TCFD:
            https://www.tcfdhub.org/wp-content/uploads/2021/10/PAT_Measuring_Portfolio_Alignment_Technical_Considerations.pdf)
        OFST820400:
          type: string
          description: >-
            Climate scenarios refer to a simplified and hypothetical
            mathematical description of a possible future evolution of the
            global coupled energy-economy system.  Currently, a range of climate
            scenarios exists, produced by scientific modelers, financial
            regulators (NGFS), industry expert groups (e.g., IEA), and
            nonprofits (e.g., SBTi sector pathways).
        OFST820410:
          type: string
          description: The external data provider for climate data.
        OFST820420:
          type: string
          description: >-
            The global warming potential range the Implied Temperature Rise
            falls under.
        OFST820430:
          type: string
          description: Percentage of Portfolio assets covered for Implied Temperature Rise.
        OFST820440:
          type: string
          description: >-
            Does the investment strategy include a goal to reduce the greenhouse
            gas emissions (GHGe) of its underlying investments through concrete
            short (1-3 years) or mid-term (5 years) targets.
        OFST820450:
          type: string
          description: >-
            If OFST820440 Has Goal To Reduce GHGe Of Underlying Investments is
            "yes", what is the targeted average annual reduction path, excluding
            relevant Scope 3.
        OFST820460:
          type: string
          description: >-
            If OFST820440 Has Goal To Reduce GHGe Of Underlying Investments is
            "yes", what is the targeted average annual reduction path, including
            relevant Scope 3.
        OFST820470:
          type: string
          description: >-
            Is the portfolio part of a third-party verified commitment to NZ by
            the financial institution including credible interim targets?
        OFST820480:
          type: string
          description: >-
            Are the companies in the portfolio subject to credible climate
            stewardship: - Votes/proxy votes should be consistent with the
            ambition of reaching net zero by 2050 - Any linked climate
            engagement strategy should be consistent with the ambition of
            reaching net zero by 2050 An example for a climate engagement
            initiative is Climate Action 100 - The escalation procedure is
            clearly defined and made transparent
        OFST820490:
          type: string
          description: >-
            Share of companies currently under active climate engagement as a
            percentage figure.  Climate engagement is an activity performed by
            shareholders with the goal of convincing management to take account
            of climate issues.  This dialogue includes communicating with senior
            management and/or boards of companies and filing or co-filing
            shareholder proposals.  Successful engagement can lead to changes in
            a company’s strategy and processes to reduce risks.
        OFST820500:
          type: string
          description: >-
            Percentage of votes/proxy votes that are consistent with the
            ambition of reaching net-zero by 2050 as a percentage figure.
        OFST820510:
          type: string
          description: Website link to climate stewardship report.
        OFST820520:
          type: string
          description: >-
            Is the financial institution a member of a climate engagement
            initiative?
        OFST820530:
          type: string
          description: >-
            If OFST820520 Is Financial Institution Member Of Climate Engagement
            Initiative is "yes", are companies of the portfolio covered by this
            climate engagement initiative?
        OFST820540:
          type: string
          description: >-
            If OFST820520 Is Financial Institution Member Of Climate Engagement
            Initiative is "yes", the name of that initiative.  Any linked
            climate engagement strategy should be consistent with the ambition
            of reaching net-zero by 2050.  An example for a climate engagement
            initiative is Climate Action 100+.
