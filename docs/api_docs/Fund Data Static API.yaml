components:
  schemas:
    FeesData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/FeesDataResult'
    FeesDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: The FE internal identifier code for the instrument
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000)
        Apir:
          type: string
        OFST451027:
          type: string
          description: >-
            Does the prospectus facilitate a performance fee? If there exists a
            Performance fee, please fill this field with "yes" and provide
            respective data in the field "OFST451028 Performance Fee Applied".
            Otherwise, fill this field with "no" and leave the field "OFST451028
            Performance Fee Applied" empty.
        OFST451028:
          type: string
          description: >-
            Applied performance fee. Usually lower than "OFST451030 Performance
            Fee in Prospectus". The applied performance fee should be taken from
            the fund's financial accounts or from the latest annual report. As
            it is a result of the positive or negative performance of the share
            class, it can be negative, too.
        OFST451029:
          type: string
          description: >-
            Reference date of the performance fee applied. Please update each
            time "OFST451028 Performance Fee Applied" changes.
        OFST451030:
          type: string
          description: >-
            Maximum performance fee as mentioned in the prospectus. Please note
            that this field can also be used for UCITS funds. The performance
            fee maximum is normally indicated within the prospectus.          
        OFST451032:
          type: string
          description: Minimum performance fee as mentioned in the prospectus.
        OFST451035:
          type: string
          description: >-
            Reference date of the performance fee in the prospectus. Please
            update each time "OFST451030 Performance Fee in Prospectus" changes.
        OFST451040:
          type: string
          description: >-
            Actual percentage charged for depositary (custodian) commission. If
            there is no explicit calculation of a custodian fee, e.g. if there
            is only some kind of an all-in, administration or flat fee, which
            the custodian fee is a part of, please leave this field empty.
        OFST451100:
          type: string
          description: >-
            If performance fee applies: what is the hurdle rate that is used for
            the calculation of the performance fee? (e.g. 5%; Benchmark + 3%).
            Please leave this field empty if the share class has no hurdle rate.
        OFST451160:
          type: string
          description: >-
            If performance fee applies: is there a high water mark as basis for
            the calculation of the performance fee? A high-water mark is the
            highest peak in value that an investment fund or account has
            reached. In some cases the high-water mark may be reset so that a
            lower point can be used for the calculation.
        OFST451305:
          type: string
          description: >-
            Applied subscription fee. Usually lower than the subscription fee
            maximum. This field can be used for the data dissemination between
            distributor and sub-distributor. Attention: This fee is only for the
            distribution and independent of the "OFST451336 Applied Subscription
            Fee In Favour Of Fund". In case no subscription fee may be charged
            on the share class, please provide "OFST451319 Has Subscription Fee"
            = "no" and leave this field and "OFST451306 Applied Subscription Fee
            In Favour Of Distributor Reference Date" empty. Otherwise, provide
            the respective value as well as the date in "OFST451306 Applied
            Subscription Fee In Favour Of Distributor Reference Date" and fill
            "OFST451319 Has Subscription Fee" with "yes".    
        OFST451306:
          type: string
          description: >-
            Reference date of applied subscription fee. Please update each time
            "OFST451305 Applied Subscription Fee In Favour Of Distributor"
            changes. Attention: This fee is only for the distribution and
            independent of the "OFST451337 Applied Subscription Fee In Favour Of
            Fund Reference Date".
        OFST451310:
          type: string
          description: >-
            Minimum subscription fee as mentioned in prospectus. Please note,
            this fee is not in favour of the fund, but kept by distributing
            parties.
        OFST451319:
          type: string
          description: >-
            If there exists a subscription fee, please fill this field with
            "yes" and provide respective data in the field "OFST451305 Applied
            Subscription Fee In Favour Of Distributor" and the reference date in
            the field "OFST451306 Applied Subscription Fee In Favour Of
            Distributor Reference Date". Otherwise, fill this field with "no"
            and leave the other mentioned fields empty. Attention: This fee is
            only for the distribution and independent of the "OFST451335 Has
            Applied Subscription Fee In Favour Of Fund".
        OFST451320:
          type: string
          description: >-
            Maximum subscription fee in prospectus. Please note, this fee is not
            in favour of the fund, but kept by distributing parties. For
            subscription fees in favour of fund, please use "OFST451340 Maximum
            Subscription Fee In Favour Of Fund" instead.
        OFST451335:
          type: string
          description: >-
            If there is a subscription fee in favour of the fund mentioned in
            the prospectus, please fill this field with "yes" and provide
            respective data in the field "OFST451336 Applied Subscription Fee In
            Favour Of Fund" and the reference date in the field "OFST451337
            Applied Subscription Fee In Favour Of Fund Reference Date".
            Otherwise, fill this field with "no" and leave the other mentioned
            fields empty. 
             Attention: This fee is only in favour of fund and independent of the "OFST451319 Has Subscription Fee".
        OFST451337:
          type: string
          description: >-
            Reference date of applied subscription fee in favour of fund. Please
            update each time "OFST451336 Applied Subscription Fee In Favour Of
            Fund" changes. Attention: This fee is only in favour of fund and
            independent of the "OFST451306 Applied Subscription Fee In Favour Of
            Distributor Reference Date".
        OFST451339:
          type: string
          description: >-
            Minimum subscription fee in favour of the Fund according to the
            Prospectus in order to compensate existing investors.
        OFST451340:
          type: string
          description: >-
            Maximum subscription fee in favour of the Fund according to the
            Prospectus in order to compensate existing investors. For
            subscription fees in favour of distribution partners please use
            "OFST451320 Subscription Fee Maximum" instead.
        OFST451420:
          type: string
          description: >-
            Maximum redemption fee in prospectus. Please note, this fee is not
            in favour of the fund, but kept by distributing parties. For
            redemption fees in favour of fund, please use "OFST451440 Maximum
            Redemption Fee In Favour Of Fund" instead.
        OFST451435:
          type: string
          description: >-
            If there is a redemption fee in favour of the fund mentioned in the
            prospectus, please fill this field with "yes" and provide respective
            data in the field "OFST451436 Applied Redemption Fee In Favour Of
            Fund" and the reference date in the field "OFST451437 Applied
            Redemption Fee In Favour Of Fund Reference Date". Otherwise, fill
            this field with "no" and leave the other mentioned fields empty.
            Attention: This fee is only in favour of fund and independent of the
            "OFST451419 Has Redemption Fee in Favour of Distributor".
        OFST451436:
          type: string
          description: >-
            Redemption fee in favour of the Fund according to the Prospectus in
            order to compensate existing investors. If "OFST451435 Has Applied
            Redemption Fee In Favour Of Fund" was answered with "yes", please
            mention the actual figure for the redemption fee in favour of the
            fund that is charged to the investors.   For redemption fees in
            favour of distribution partners please use "OFST451405 Applied
            Redemption Fee In Favour Of Distributor" instead.
        OFST451437:
          type: string
          description: >-
            Reference date of applied redemption fee in favour of fund. Please
            update each time "OFST451436 Applied Redemption Fee In Favour Of
            Fund" changes. Attention: This fee is only in favour of fund and
            independent of the "OFST451406 Applied Redemption Fee In Favour Of
            Distributor Reference Date".
        OFST451439:
          type: string
          description: >-
            The minimum redemption fee that is in favour of the fund according
            to the Prospectus to avoid dilution effects within the fund.
        OFST451440:
          type: string
          description: >-
            The maximal redemption fee that is in favour of the fund according
            to the Prospectus to avoid dilution effects within the fund. For
            redemption fees in favour of distribution partners please use
            "OFST451420 Redemption Fee Maximum" instead.
        OFST452000:
          type: string
          description: >-
            Applied management fee of this share class. In case the value of
            "OFST020545 Share Class Lifecycle"  is “projected” or “to be
            launched” please leave this field blank unless you have this
            information.
        OFST452001:
          type: string
          description: >-
            Reference date of applied management fee. Please update each time
            "OFST452000 Management Fee Applied" changes. In case the value of
            "OFST020545 Share Class Lifecycle"  is “projected” or “to be
            launched” please leave this field blank unless you have this
            information.
        OFST452005:
          type: string
          description: Minimum management fee as mentioned in prospectus.
        OFST452010:
          type: string
          description: Maximum management fee as mentioned in prospectus.
        OFST452014:
          type: string
          description: >-
            Please choose "yes", if an All-in fee applies for the share class.
            If this field is populated with "no", please leave the following
            fields empty: OFST452015 All-in Fee Maximum OFST452017 All-in Fee
            Applied OFST452019 All-in Fee Includes Transaction Costs OFST452020
            All-in Fee Date Some fund providers charge an All-in fee, of which
            the fund management fee and other fees are a component that the
            provider may or may not choose to state separately. This All-in fee
            should be indicated in this field. Other terms synonymous with
            All-in fee are e. g. flat fee or management company fee with fixed
            fee.
        OFST452015:
          type: string
          description: >-
            All-in fee as mentioned in the sales prospectus. Usually includes
            fees for portfolio management, sales, administration, custody and
            others. Please refer to "OFST452019 All-in Fee Includes Transaction
            Costs" to choose, whether the all-in fee includes also transaction
            costs within the fund.
        OFST452017:
          type: string
          description: >-
            All-in fee this share class is actually charged with. Has to be
            lower or same as the "OFST452015 All-in Fee Maximum" that is
            mentioned in the sales prospectus. Usually the all-in fee includes
            fees for portfolio management, sales, administration, custody and
            others. Please refer to "OFST452019 All-in Fee Includes Transaction
            Costs" to choose, whether the all-in fee includes also transaction
            costs within the fund.
        OFST452019:
          type: string
          description: >-
            Please choose "yes", if "OFST452015 All-in Fee Maximum" and
            "OFST452017 All-in Fee Applied" include transaction costs. If not,
            please choose "no".
        OFST452020:
          type: string
          description: >-
            Effective date for all openfunds fields referring to All-in Fee,
            e.g. "OFST452015 All-in Fee Maximum", "OFST452017 All-in Fee
            Applied".
        OFST452100:
          type: string
          description: >-
            Latest available Total Expense Ratio (TER) that is calculated
            without accounting for a possible performance fee. In some countries
            the TER has to be published in the annual report and in the
            semi-annual report. If the fund invests into other funds, the target
            fund's TER should be included into the calculation of the fund's
            TER.
        OFST452110:
          type: string
          description: >-
            Date of latest available Total Expense Ratio (TER) that is
            calculated without accounting for a possible performance fee. In
            some countries the TER has to be published in the annual report and
            in the semi-annual report.
        OFST452120:
          type: string
          description: >-
            Latest available Total Expense Ratio (TER) that is calculated
            including a charged performance fee. In some countries the TER has
            to be published in the annual report and in the semi-annual report.
            If the fund invests into other funds, the target fund's TER should
            be included into the calculation of the fund's TER.
        OFST452130:
          type: string
          description: >-
            Date of latest available Total Expense Ratio (TER) that is
            calculated including a possible performance fee. In some countries
            the TER has to be published in the annual report and in the
            semi-annual report.
        OFST452190:
          type: string
          description: >-
            If there exist ongoing charges, please fill this field with "yes"
            and provide respective data in the field "OFST452200 Ongoing
            Charges" and "OFST452220 Ongoing Charges Date". Otherwise, fill this
            field with "no" and leave the field "OFST452200 Ongoing Charges" and
            "OFST452220 Ongoing Charges Date" empty.
        OFST452200:
          type: string
          description: >-
            Ongoing charges as described in the esma guidelines - "Methodology
            for calculation of the Ongoing Charges figure in the Key Investor
            Information Document"
            (https://www.esma.europa.eu/document/guidelines-methodology-calculation-ongoing-charges-figure-in-key-investor-information).
            This value is supposed to be listed on the UCITS KIIDs.
              In most cases this figure equals "OFST452202 PRIIPS Other Ongoing Costs". However, the PRIIP's KID composition of costs should be consistent with the KID's reduction in yield calculation (OFST460198 RHP RIY), which may require an adjustment to reflect the entry costs (OSFT451300 PRIIPS Subscription Fee In Favour Of Fund) in the RIY calculation.
              In case there are no ongoing charges provided, please insert "OFST452190 Has Ongoing Charges" = "no" and leave this field and "OFST452220 Ongoing Charges Date" empty. Otherwise, provide the respective value as well as the ongoing charges date in "OFST452220 Ongoing Charges Date" and fill "OFST452190 Has Ongoing Charges" with "yes".
        OFST452220:
          type: string
          description: Date of latest ongoing charges calculation for UCITS.
        OFST453151:
          type: string
          description: >-
            Answer «yes» only, if the fund or ManCo are not paying trailer fees
            for this specific share class.
        OFST453155:
          type: string
          description: >-
            If this is not a trailer fee clean share class, i.e. "OFST453151 Is
            Trailer Fee Clean" = "no", then "Equivalent Trailer Fee Clean ISIN"
            reflects the existence of an equivalent trailer fee clean share
            class by naming its ISIN. Equivalence in this context means the same
            subfund, i.e. same "OFST020080 Share Class Consolidation Key", same
            "OFST020400 Share Class Distribution Policy", same "OFST020540 Share
            Class Currency", same "OFST020261 Currency Hedge Share Class", same
            value for "OFST802500 Has Reduced Luxembourg Taxe d'Abonnement" and
            optional same "OFST6030XX Country Legal Registration" as well as
            same "OFST6031XX Country Marketing Distribution". Other fields like
            "OFST020620 Is Restricted To Separate Fee Arrangements" may be
            different.
        OFST454160:
          type: string
          description: >-
            Separate distribution fee. While a trailer fee is a component of
            annual management fee it is commonly understood within the industry,
            that the distribution fee belongs as a whole or to an important
            extend to the distributor. //This field was declared "no longer
            supported" in version 1.26, but has been returned to active status
            as of v1.27 of openfunds, for non-EMT usage. For EMT please use the
            regulatory-specific "OFEM071200 EMT Distribution Fee".//
        OFST451045:
          type: string
          description: >-
            Reference date of applied custodian fee. Please update each time
            "OFST451040 Custodian Fee Applied" changes.
        OFST451390:
          type: string
          description: >-
            Contingent deferred sales charge fee (CDSC Fee). A CDSC Fee is a fee
            that is charged to investors for early redemptions. This fee is also
            known as sales charge or back-end load. CDSC Fees are a percentage
            of the value of the sold fund. It is the highest in the first year
            and decreases annually. After the specified period the fee amounts
            zero. The mechanism might differ, but quite often it is a
            combination of an upfront fee paid by the fund to the investment
            manager or distribution partner. At the end of the required period,
            the investment manager or distribution partner will reimburse the
            whole fee back to the fund. If some of the investors had redeemed
            early they have to pay a portion of that fee which related to their
            investment duration.
        OFST451391:
          type: string
          description: >-
            In this field the Contingent Deferred Sales Charge Exit Fee (CDSC
            Exit Fee) can be filled in as a free format text. A CDSC Exit Fee is
            a fee that is charged to investors for early redemptions. This fee
            is also known as sales charge or back-end load. CDSC Fees are a
            percentage of the value of the sold fund. It is the highest in the
            first year and decreases annually. After the specified period the
            fee amounts zero. The mechanism might differ, but quite often it is
            a combination of an upfront fee paid by the fund to the investment
            manager or distribution partner. At the end of the required period,
            the investment manager or distribution partner will reimburse the
            whole fee back to the fund. If some of the investors had redeemed
            early they have to pay a portion of that fee which related to their
            investment duration. The amount for the first year might equal the
            "OFST451392 Contingent Deferred Sales Charge Upfront Fee".
        OFST451392:
          type: string
          description: >-
            In this field the Contingent deferred sales charge upfront fee (CDSC
            Upfront Fee) can be mentioned as a number. The CDSC Upfront Fee is a
            percentage of the value of the sold fund. The mechanism might
            differ, but quite often it is a combination of this fee paid by the
            fund to the investment manager or distribution partner and an exit
            fee. At the end of the required period, the investment manager or
            distribution partner will reimburse the whole fee back to the fund.
            If some of the investors had redeemed early they have to pay a part
            of this reimbursement, which is called the "OFST451391 Contingent
            Deferred Sales Charge Exit Fee". The amount of this fee is related
            to the investment duration.
        OFST451405:
          type: string
          description: >-
            Applied redemption fee. Usually lower than the redemption fee
            maximum. This field can be used for the data dissemination between
            distributor and sub-distributor. Attention: This fee is only for the
            distribution and independent of the "OFST451436 Applied Redemption
            Fee In Favour Of Fund". In case there is no redemption fee currently
            charged, please provide "OFST451419 Has Redemption Fee in Favour of
            Distributor" = "no" and leave this field and "OFST451406 Applied
            Redemption Fee In Favour Of Distributor Reference Date" empty.
            Otherwise, provide the respective value as well as the date in
            "OFST451406 Applied Redemption Fee In Favour Of Distributor
            Reference Date" and fill "OFST451419 Has Redemption Fee in Favour of
            Distributor" with "Yes".
        OFST451406:
          type: string
          description: >-
            Reference date of applied redemption fee. Please update each time
            "OFST451405 Applied Redemption Fee In Favour Of Distributor"
            changes. Attention: This fee is only for the distribution and
            independent of the "OFST451437 Applied Redemption Fee In Favour Of
            Fund Reference Date".
        OFST451410:
          type: string
          description: >-
            Minimum redemption fee in prospectus. Please note, this fee is not
            in favour of the fund, but kept by distributing parties.
        OFST451419:
          type: string
          description: >-
            If there exists a redemption fee, please fill this field with "yes"
            and provide respective data in the field "OFST451405 Applied
            Redemption Fee In Favour Of Distributor" and the reference date in
            the field "OFST451406 Applied Redemption Fee In Favour Of
            Distributor Reference Date". Otherwise, fill this field with "no"
            and leave the other mentioned fields empty. Attention: This fee is
            only for the distribution and independent of the "OFST451435 Has
            Applied Redemption Fee In Favour Of Fund".
        OFST454150:
          type: string
          description: >-
            Is there a separate distribution fee according to the Prospectus?
            Warning: This field is about a separate distribution fee, which is
            not included in the annual management fee.
        OFST454161:
          type: string
          description: >-
            Reference date of distribution fee. Please update each time
            "OFST454160 Distribution Fee" changes.
        OFST454300:
          type: string
          description: >-
            Is there a possible dilution levy in favour of the fund that can be
            charged at the discretion of the fund manager to compensate for
            market transaction costs within the fund? Usually a dilution levy is
            charged only for bigger single in- or outflows, whereas a
            "OFST451440 Maximum Redemption Fee In Favour Of Fund" is charged on
            all fund subscriptions or redemptions.
        OFST451042:
          type: string
          description: >-
            Maximum percentage charged for depositary (custodian) commission, as
            per prospectus. If there is no explicit reference to a custodian
            fee, e.g. if there is only some kind of an all-in, administration or
            flat fee, which the custodian fee is a part of, please leave this
            field empty.
        OFST451065:
          type: string
          description: >-
            Maximum value charged for miscelaneous administrative work, such as
            opening an account, preparing or printing contracts, etc. if
            disclosed in prospectus as a separate value from the costs included
            into other charges. If not explicitly mentioned in prospectus,
            please leave this field blank.
        OFST454165:
          type: string
          description: >-
            Maximum fee charged to shareholders exclusively by the distributor,
            as per prospectus.
    CountrySpecificFieldsData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/CountrySpecificFieldsDataItem'
    CountrySpecificFieldsDataItem:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST700601:
          type: string
          description: >-
            Classification of investment products under MAS scheme, which
            determines whether a wider range of investment funds including ETFs
            can be easier accessed by retail investors
            ("https://www.mas.gov.sg/news/media-releases/2015/easier-access-to-simpler-funds-for-retail-investors"
            AND "https://www.mas.gov.sg/regulation/notices/notice-sfa-04-n12")
        OFST700605:
          type: string
          description: >-
            GST (Goods and Services Tax) treatment of services provided or
            received by fund managers in Singapore ("
            https://www.iras.gov.sg/irashome/uploadedFiles/IRASHome/e-Tax_Guides/etaxguide_GST_Guide%20for%20the%20Fund%20Management%20Industry_2015-03-18.pdf
            " AND "
            https://www.iras.gov.sg/irashome/GST/GST-registered-businesses/Learning-the-basics/Goods-and-Services-Tax--GST---What-It-Is-and-How-It-Works/
            ")
        OFST700610:
          type: string
          description: >-
            Please indicate in this field whether the share class is a Central
            Provident Fund Investment Scheme (CPFIS) where investors invest
            their Ordinary Account (OA) savings in a wider range of investments
            (= "yes") or not (= "no"). For further information about CPFIS-OA
            please visit the following website:
            https://www.cpf.gov.sg/members/schemes/schemes/optimising-my-cpf/cpf-investment-schemes
            For further information about CPF please visit:
            https://www.cpf.gov.sg/Members/AboutUs/about-us-info/cpf-overview
        OFST700615:
          type: string
          description: >-
            Please indicate in this field whether the share class is a Central
            Provident Fund Investment Scheme (CPFIS) where investors invest
            their Special Account (SA) savings in a wider range of investments
            (= "yes") or not (= "no"). For further information about CPFIS-SA
            please visit the following website:
            https://www.cpf.gov.sg/members/schemes/schemes/optimising-my-cpf/cpf-investment-schemes
            For further information about CPF please visit:
            https://www.cpf.gov.sg/Members/AboutUs/about-us-info/cpf-overview
        OFST700620:
          type: string
          description: >-
            Please indicate in this field whether the share class is a
            Supplementary Retirement Scheme (SRS) (= "yes") or not (= "no"). For
            further information about a SRS please visit the following website:
            https://www.cpf.gov.sg/Members/faq/schemes/Other-Matters/Others?ajsrc=FS&#faq2192593
        OFST700630:
          type: string
          description: >-
            Are the funds' investments in conformance with the Ordinance of the
            Swiss Pension's Act (Verordnung über die berufliche Alters-,
            Hinterlassenen- und Invalidenvorsorge (BVV 2)) Art. 53 and Art. 55?
            Please be aware that this ordinance has been tightened on January
            1st, 2015. Typically, these funds are set up and distributed only to
            pension funds.
        OFST700640:
          type: string
          description: >-
            Is the fund a Swiss investment foundation (German: Anlagestiftung)?
            This field only applies for funds domiciled in Switzerland. Swiss
            investment foundations are foundations that are used for
            occupational benefits. They are subject to Swiss law and are
            supervised by the Occupational Benefits Supervision Commission (OAK
            BV). Investment foundations form a special category of investment
            funds that are exclusively intended for pension funds. The purpose
            of an investment foundation is to manage the assets of several
            pension funds. According to the legal definition of the permitted
            group of investors, neither natural nor legal persons resident or
            domiciled outside of Switzerland may participate in Swiss investment
            foundations.
        OFST700650:
          type: string
          description: >-
            From a fund houses perspective: May this share class be distributed
            to Swiss retail clients? Retail Clients are according to article 4
            paragraph 2 of the Financial Services Act (FinSA), in German
            "Finanzdienstleistungsgesetz" (FIDLEG), clients which are not
            professional clients. According to article 4 paragraph 3
            professional clients are considered to be: a. financial
            intermediaries under the Banking Act of 8 November 1934, the
            Financial Institutions Act of...6 and the Collective Investment
            Schemes Act of 23 June 2006 b. insurance companies in accordance
            with the Insurance Supervision Act of 17 December 2004; c. foreign
            customers, who have an equivalent prudential supervision as the
            persons of letter a and b; d. central banks; e. public-law
            corporations with professional vaults; f. pension schemes and
            institutions whose purpose is to provide occupational pension with
            professional vaulting; g. Company with professional vaults. For more
            information please consider the following links:
            https://www.newsd.admin.ch/newsd/message/attachments/41567.pdf (only
            in German available)
            https://www.efd.admin.ch/efd/en/home/themen/wirtschaft--waehrung--finanzplatz/finanzmarktpolitik/fidleg-finig/fb-fidleg-finig.html
            (available in English, French, German and Italian)
        OFST700660:
          type: string
          description: >-
            Is the fund compliant with the guidelines of the Swiss Bankers
            Association (SBA)? The guidelines of the SBA can be found at
            https://www.swissbanking.org/library/richtlinien/richtlinien-fur-vermogensverwaltungsauftrage/20170301-3200-all-rl_mini_revision_portfolio-management-guidelines_e-cla.pdf/@@download/file/20170301-3200-ALL-RL_Mini_Revision_Portfolio%20Management%20Guidelines_E_final-CLA.pdf
        OFST700670:
          type: string
          description: >-
            Is the share class Swiss affidavit eligible or is it intended to be
            on the upcoming distributions. In order to reclaim withholding tax
            on income payments in Switzerland, a Bank Declaration (Affidavit) is
            required for each income payment for each investment fund. If the
            informed share class distributes income subject to Affidavit
            eligibility, the field's value should be "yes"
        OFST701030:
          type: string
          description: >-
            There are over 35 IA (The Investment Association) sectors. These are
            there to help anyone navigate around the large universe of funds
            solds in the UK and include some offshore (EU) funds.
        OFST701040:
          type: string
          description: Is the share class ISA (Individual Savings Account) compliant?
        OFST701041:
          type: string
          description: >-
            Is the share class SIPP (Self Invested Personal Pension) compliant?
            A SIPP is a tax-efficient retirement savings account. It allows
            individuals to make their investment decisions from a wide range of
            investments, which are approved by the country's HMRC (Her Majesty's
            Revenue and Customs).
        OFST701042:
          type: string
          description: >-
            This field is only relevant for UK based funds. If this is not the
            case, please leave the field blank. Is the fund a Non-UCITS Retails
            Scheme (NURS)? A NURS is a fund, which is neither a UCITS scheme nor
            a qualified investor scheme according to the UK Financial Conduct
            Authority.
        OFST701043:
          type: string
          description: >-
            Individual Savings Account (ISA) is a form of investment that is
            exempt from tax on returns. There are two types of ISA: - stocks and
            shares - cash
        OFST701044:
          type: string
          description: >-
            Is the fund registered for the FCA's TMPR (Temporary Marketing
            Permissions Regime). UCITS compliant funds currently registered in a
            European Economic Area (EEA) state will cease to qualify for ISA/CTF
            inclusion unless they have entered the Financial Conduct Authority’s
            (FCA’s) new Temporary Marketing Permissions Regime (TMPR) prior to
            the Implementation Period Completion Day (IPCD) of the withdrawal of
            the United Kingdom (UK) from the European Union (EU). Funds that do
            not enter the TMPR will be de-recognised by the FCA, cease to be ISA
            qualifying and should not be purchased by managers/providers to hold
            in ISAs/CTFs. More information can be found at
            https://www.fca.org.uk/brexit/temporary-permissions-regime.
        OFST701045:
          type: string
          description: >-
            Is the fund a UK-authorised UCITS? Such funds are UK-domiciled funds
            that would have had the value "UCITS" in field OFST160040 Type of EU
            Directive prior to the Implementation Period Completion Day (IPCD)
            of the withdrawal of the United Kingdom (UK) from the European Union
            (EU), and should have the value "AIF" in that field post-IPCD. The
            IPCD is defined in the EU (Withdrawal Agreement) Act 2020 as 31
            December 2020 at 11pm
            (https://www.legislation.gov.uk/ukpga/2020/1/contents/enacted).
        OFST701050:
          type: string
          description: >-
            This field is only relevant for UK based funds. If this is not the
            case, please leave the field empty. Is the fund a Property
            Authorised Investment Fund (PAIF)? A PAIF is an authorised
            investment fund primarily invested in property and is a UK regulated
            fund vehicle. There is no taxation of property profits at fund
            level. Only eligible investors (e.g. Individual Savings Account,
            Self Invested Personal Pension) are allowed to invest in PAIF.
        OFST701055:
          type: string
          description: >-
            This field is only funds based or distributed in the UK. If this is
            not the case, please leave the field empty. Is the share class an UK
            approved investment trust? Please refer to
            https://www.gov.uk/hmrc-internal-manuals/investment-funds/ifm14120
            for more information.
        OFST701065:
          type: string
          description: >-
            Is the fund an FIIA (Fund Invested in Inherently Illiquid Assets)
            according to the definition in FCA Policy Statement PS19/24. Funds
            investing in inherently illiquid assets are those that have invested
            (or intend to invest) at least 50% in illiquid assets for at least 3
            continuous months in the last 12 and that have not aligned the
            dealing frequency with the expected time to liquidate assets. Funds
            with limited redemption frequency do not have to be classified as
            FIIAs. Full details can be found in the Policy Statement at
            https://www.fca.org.uk/publication/policy/ps19-24.pdf. The changes
            will apply from 30 September 2020, but groups can apply them earlier
            if they are concerned about customer detriment.
        OFST701075:
          type: string
          description: >-
            This field is only relevant for UK based funds. If this is not the
            case, please leave the field empty. The TEF is a tax regime that
            applies to an authorised investment fund. It is likely to be
            beneficial to those funds that invest in a mixed portfolio of assets
            but do not receive any income directly from a UK or overseas
            property business.
        OFST701085:
          type: string
          description: >-
            Is the fund authorised by the FCA (Financial Conduct Authority, a UK
            financial regulatory body responsible for regulation of conduct by
            both retail and wholesale financial services firms)? An authorised
            fund, which may also be called an "authorised CIS", must be
            established in the UK and take one of the following legal forms: -
            authorised contractual scheme (ACS) - authorised unit trust (AUT) -
            investment company with variable capital (ICVC) It must also be
            classified, based on a marketing strategy, as one of the following:
            - undertaking for collective investment in transferable securities
            scheme (UCITS) - non-UCITS retail scheme (NURS) - qualified investor
            scheme (QIS)
        OFST701086:
          type: string
          description: >-
            Is the fund recognised by the FCA (Financial Conduct Authority, a UK
            financial regulatory body responsible for regulation of conduct by
            both retail and wholesale financial services firms)? A fund that is
            established outside the UK must be recognised to be promoted to
            retail investors in the UK. A recognised fund may also be called a
            ‘recognised CIS’ or ‘overseas scheme’. A UCITS established in
            another EEA country must be recognised, under section 264 of the
            Financial Services Markets Act 2000 (FSMA). Other funds established
            in another EEA country, including an alternative investment fund
            (AIF) authorised in another EEA country, must be recognised under
            section 272 of FSMA. For more information please consider:
            http://www.legislation.gov.uk/ukpga/2000/8/pdfs/ukpga_20000008_en.pdf
        OFST701090:
          type: string
          description: >-
            Depending on the underlying investments, income arising may be a
            dividend distribution or an interest distribution. It is mandatory
            for Management Companies to inform the type of distribution.
            Dividend distributions from UK domiciled funds that fall within the
            dividend allowance are not subject to the tax. However, a tax
            liability may arise on the excess depending on the shareholder
            personal circumstances. Interest distributions from UK domiciled
            funds are taxed as savings income and may be eligible for the
            Personal Savings Allowance or the 0% starting rate tax band for
            savings.
        OFST710095:
          type: string
          description: >-
            Please state the category of the fund as described in CNMV A01
            Model: page 6
            https://www.cnmv.es/DocPortal/legislacion/ModelosNormalizados/IIC/ManualCumpA01-C_2_2017.pdf
            Vocación (8): política de inversión. Las políticas de inversión son
            las siguientes: - MF: MMF Funds - FF: Fixed Income Funds - EQ:
            Equities Funds - HG: Hedge Funds - MX: Mixed Funds - RE: Real estate
            Funds - OT: Other Funds
        OFST710100:
          type: string
          description: >-
            Register number in Comisión Nacional del Mercado de Valores (CNMV):
            numeric code assigned by CNMV to 'foreign funds' when legally
            registered in CNMV for their distribution in Spain and for funds
            domiciled in Spain. For more information please refer to
            https://www.cnmv.es/portal/home.aspx Please be aware that the CNMV
            can be on umbrella or fund level or a mixture of both levels. For
            this reason, openfunds sets this field on fund level so that it can
            be used for umbrella level as well. Kindly be informed that this
            could lead to validation difficulties, but it is a necessary
            trade-off to be taken.
        OFST710101:
          type: string
          description: >-
            Does the fund follow a master-feeder structure? If yes, please
            indicate one representative ISIN code of the master fund in field
            "OFST710102 Representative ISIN Code Of Master Fund".
        OFST710102:
          type: string
          description: >-
            If the fund follows a master-feeder structure (= the value of
            "OFST710101 Is Feeder Fund" is "yes"), what is one representative
            ISIN code of the master fund?
        OFST710110:
          type: string
          description: >-
            As set out in paragraph 6.2 of the Guidelines on Online Distribution
            and Advisory Platforms (Guidelines), a Platform Operator should
            determine whether a product may be treated as non-complex or complex
            with regard to the factors set out in paragraph 6.1 of the
            Guidelines and the non-exhaustive list of examples of non-complex
            and complex products set out on the SFC’s website:
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/
            A non-exhaustive list of examples of investment products that are
            considered to be "non-complex" are available under the following
            link:
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complex-and-complex-products/
            Under the same link a non-exhaustive list of examples of investment
            products that are considered to be complex products is available.
            The SFC may revise the list of non-complex products from time to
            time where appropriate.
        OFST710113:
          type: string
          description: >-
            //No longer supported.// The maximal allowable percentage of NAV
            investing in Complex Bonds as stated in the prospectus. Please note
            that this field is an Asia specific requirement. According to the HK
            SFC complex bonds refers to bonds with special features, including:
            - That are perpetual in nature and interest pay-out depends on the
            viability of the issuer in the very long term; - That have
            subordinated ranking and in case of liquidation of the issuer,
            investors can only get back the principal after other senior
            creditors are paid; - That have variable and/or deferral of interest
            payment terms and investors would face uncertainty over the amount
            and time of the interest payments to be received; - That have
            extendable maturity dates and investors would not have a definite
            schedule of principal repayment; - That are convertible or
            exchangeable in nature and investors are subject to both equity and
            bond investment risk; and/or - That have contingent write down or
            loss absorption feature and the bond may be written-off fully or
            partially or converted to common stock on the occurrence of a
            trigger event. - Those with multiple credit support providers and
            structures - Bonds comprising one or more special features For more
            information please also consider the following links:
            http://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=12EC12
            http://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=14EC18
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complex-and-complex-products/
            https://www.hkma.gov.hk/media/eng/doc/key-information/guidelines-and-circular/2018/20181030e2.pdf
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/intermediaries/supervision/doc?refNo=18EC89
        OFST710114:
          type: string
          description: >-
            //No longer supported.// The maximal allowable percentage of NAV
            investing in Derivatives as stated in the prospectus. Please note
            that this field is an Asia specific requirement. HK SFC defines
            derivative funds as complex if the fund invests more than 50% of NAV
            in derivative investments. However, under the following
            circumstances the use of derivatives should not be included in the
            calculation of the 50% limit: - netting, hedging and risk mitigation
            - cash flow management - market access or exposure replication
            (without incremental leverage at the fund portfolio level) -
            investment in conventional convertible bonds For more information
            please consider
            https://www.sfc.hk/edistributionWeb/gateway/EN/consultation/conclusion?refNo=17CP8
        OFST710115:
          type: string
          description: >-
            //No longer supported.// The maximal allowable percentage of NAV
            investing in High Yield Bonds. High Yield Bonds refer to bonds,
            which are generally below investment grade or are unrated. Please
            note that this field is an Asia specific requirement. For more
            information please consider the following links:
            http://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=12EC12
            http://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=14EC18
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complex-and-complex-products/
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/intermediaries/supervision/doc?refNo=18EC89
        OFST710116:
          type: string
          description: >-
            //No longer supported.// The maximal intended percentage of NAV
            investing in complex bond in the next 12 months. Please note that
            this field is an Asia specific requirement. According to the HK SFC
            complex bonds refers to bonds with special features, including: •
            That are perpetual in nature and interest pay-out depends on the
            viability of the issuer in the very long term; • That have
            subordinated ranking and in case of liquidation of the issuer,
            investors can only get back the principal after other senior
            creditors are paid; • That have variable and/or deferral of interest
            payment terms and investors would face uncertainty over the amount
            and time of the interest payments to be received; • That have
            extendable maturity dates and investors would not have a definite
            schedule of principal repayment; • That are convertible or
            exchangeable in nature and investors are subject to both equity and
            bond investment risk; and/or • That have contingent write down or
            loss absorption feature and the bond may be written-off fully or
            partially or converted to common stock on the occurrence of a
            trigger event. • Those with multiple credit support providers and
            structures • Bonds comprising one or more special features For more
            information please consider the following links:
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complex-and-complex-products/
            https://www.hkma.gov.hk/media/eng/doc/key-information/guidelines-and-circular/2018/20181030e2.pdf
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/intermediaries/supervision/doc?refNo=18EC89
        OFST710117:
          type: string
          description: >-
            //No longer supported.// The maximal intended percentage of NAV
            investing in derivatives in the next 12 months. Please note that
            this field is an Asia specific requirement. HK SFC defines
            derivative funds as complex if the fund invests more than 50% of NAV
            in derivatives investments. However, under the following
            circumstances the use of derivatives should not be included in the
            calculation of the 50% limit: - netting, hedging and risk mitigation
            - cash flow management - market access or exposure replication
            (without incremental leverage at the fund portfolio level) -
            investment in conventional convertible bonds For more information
            please consider
            https://www.sfc.hk/edistributionWeb/gateway/EN/consultation/conclusion?refNo=17CP8
        OFST710118:
          type: string
          description: >-
            //No longer supported.// The maximal intended percentage of NAV
            investing in High Yield Bonds in the next 12 months. Please note
            that this field is an Asia specific requirement. High-yield bonds
            refer to bonds, which are generally below investment grade or are
            unrated.
        OFST710119:
          type: string
          description: >-
            //No longer supported.// Percentage of gross asset value (GAV) in
            virtual assets. Please note that this field is an Asia specific
            requirement. HK SFC defines virtual assets as digital represented
            values (e.g. digital currencies, crypto assets, virtual commodities
            or other assets of essentially the same nature). Further to that,
            virtual asset funds are - funds that have a stated investment
            objective to invest in virtual assets or intend to invest - or have
            invested more than 10% of gross asset value in virtual assets
            directly or indirectly. Distribution of virtual assets funds is
            subject to suitability obligations, selling restrictions, client's
            concentration risk assessment requirements by the HK SFC. For more
            information about the distribution of virtual assets funds in Asia
            please consider
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=18EC77
        OFST710120:
          type: string
          description: >-
            Is the fund’s maximum exposure to virtual assets more than 10% of
            its GAV? For more information about the distribution of virtual
            assets funds in Asia please consider
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=18EC77
            The field is expected to be refreshed at least annually with either
            the last update or review date indicated. More information on
            filling the fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710121:
          type: string
          description: >-
            As of Date for Virtual Assets entry. According to the PWMA the Fund
            manager must supply an "as of date", for individual distributor to
            determine the "freshness" of the information and if follow up
            required. The nature of this date field is the verification of the
            respective field's value. Depending on the database structure this
            field may not be stored, but populated while exporting. The field is
            expected to be refreshed at least annually with either the last
            update or review date indicated. More information on filling the
            fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710130:
          type: string
          description: >-
            Is the fund a Renminbi Qualified Foreign Institutional Investor
            (RQFII) fund? According to the SFC an RQFII fund comprises at least
            80% renminbi debt instruments issued in mainland China and an
            optional not-more-than 20% of A-shares or other permissible
            investments in that market. Subscriptions and redemptions of fund
            units are settled in renminbi. The field is expected to be refreshed
            at least annually with either the last update or review date
            indicated. For more information, please consider
            https://www.sfc.hk/edistributionWeb/gateway/EN/news-and-announcements/news/doc?refNo=12PR2
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710131:
          type: string
          description: >-
            As of Date for RQFII entry. According to the PWMA the Fund manager
            must supply an "as of date", for individual distributor to determine
            the "freshness" of the information and if follow up required. The
            nature of this date field is the verification of the respective
            field's value. Depending on the database structure this field may
            not be stored, but populated while exporting. The field is expected
            to be refreshed at least annually with either the last update or
            review date indicated. More information on filling the fields can be
            found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710140:
          type: string
          description: >-
            Does the Fund comply with the requirements of the PIR (Piani
            Individuali di Risparmio) regulation introduced in Italy? PIR means
            in English tax-exempt and long-term individual savings plan. PIR
            funds are not necessarily Italian funds. Funds of other domiciles
            can be PIR funds as well.
        OFST710150:
          type: string
          description: >-
            The Italian Reduced Rate Percentage (IRRP) to apply for the
            semester. The so-called White List is a list of countries that allow
            an adequate exchange of information with Italy. It is contained in a
            Ministerial Decree of 4 September 1996, which should be updated
            every six months. Capital gains on non-qualifying shares in a
            resident non-listed company are exempt from 26 percent substitute
            tax if the seller is a resident of a White-List country. As from 1
            January 2012, direct investment in government bonds are subject to a
            lower rate (i.e. 12.5%) than comparable investments made through
            Italian or Luxembourg regulated investment funds. To allow the
            application of the 12.5% tax rate to investment funds investing into
            Italian government bonds and assimilated securities, investment
            funds may perform an asset test which estimates the percentage of
            the portfolio invested in qualifying government bonds. An up to date
            version of the Italian country "white list" may be found at this URL
            https://www.acupay.com/resources-help-links/resources/italy-resources/.
        OFST710153:
          type: string
          description: >-
            Initial date of the semester where the "OFST710150 Italian Reduced
            Rate Percentage" applies.
        OFST710154:
          type: string
          description: >-
            End date of the semester where the "OFST710150 Italian Reduced Rate
            Percentage" applies.
        OFST710155:
          type: string
          description: >-
            The end date for the calculation period used to determine
            "OFST710150 Italian Reduced Rate Percentage" was calculated. If no
            start date is available, this field can be provided without
            OFST710156 Italian Reduced Rate Percentage Calculation Period Start
            Date.
        OFST710185:
          type: string
          description: >-
            Belgian Tax on Savings Income - does the Fund fall within the scope
            of application of the BTSI. Elements to be examined: - the type of
            Fund; - the asset composition (determination of the % of assets
            invested in debts pursuant to the “Belgian Asset Test”); - the
            distribution policy.
        OFST710200:
          type: string
          description: >-
            Is this share class subject to Belgian Taxable Income per Share
            (TIS)? If the Belgian average asset test debt percentage is higher
            then 10%, than the Belgian TIS is required.
        OFST710213:
          type: string
          description: >-
            The start date of the Belgian average asset test. In order to
            determine whether or not a share class falls under the Belgian TIS,
            an asset test has to be performed.
        OFST710214:
          type: string
          description: >-
            The end date of the Belgian average asset test. In order to
            determine whether or not a share class falls under the Belgian TIS,
            an asset test has to be performed.
        OFST710220:
          type: string
          description: >-
            Is the fund compliant with the Netherlands ban on investment in
            cluster munitions, laid out in Section 21a of the Market Abuse
            (Financial Supervision Act) Decree (Besluit Marktmisbruik Wft). The
            ban is an extension of the Convention on Cluster Munitions, to which
            the Netherlands is a signatory. The AFM is responsible for
            supervision of compliance with the ban. More information can be
            found at
            https://www.afm.nl/en/professionals/veelgestelde-vragen/clustermunitie-investeringsverbod.
        OFST710300:
          type: string
          description: >-
            Is the fund considered as a "derivative fund" under the prevailing
            SFC Code on Unit Trusts and Mutual Funds? This field is for SFC
            authorised funds only. Note: For SFC-authorised funds, it is
            considered by the fund manager as a "derivative fund" on the same
            basis as provided to the SFC for disclosure on the SFC website. The
            field is expected to be refreshed at least annually with either the
            last update or review date indicated. More information on filling
            the fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710301:
          type: string
          description: >-
            As of Date for Derivative Fund entry. According to the PWMA the Fund
            manager must supply an "as of date", for individual distributor to
            determine the "freshness" of the information and if follow up
            required. The nature of this date field is the verification of the
            respective field's value. Depending on the database structure this
            field may not be stored, but populated while exporting. The field is
            expected to be refreshed at least annually with either the last
            update or review date indicated. More information on filling the
            fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710305:
          type: string
          description: >-
            This field regarding the Regulation in Hong Kong about complex and
            non-complex funds. A non-exhaustive list of examples of non-complex
            and complex products can be found on the SFC’s website:
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complexand-complex-products/
            This field is to indicate if the fund is - a fund in a specified
            jurisdiction or - a public fund in a non-specified jurisdiction or -
            a non-public fund in a non-specified jurisdiction. This field is for
            non-SFC authorised funds only. To obtain a list of specified
            jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710310:
          type: string
          description: >-
            Has the fund used derivatives for investment purposes during the
            past 12 months? Investment purposes do not include: - netting,
            hedging or risk mitigation - cash flow management - market access or
            exposure replication (without incremental leverage at the fund
            portfolio level) - investments in conventional convertible bonds
            This field is to be used, if the fund is a registered retail fund in
            a specified jurisdiction. To obtain a list of specified jurisdiction
            please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710315:
          type: string
          description: >-
            Does the fund intend to use or invest in derivatives in excess of:
            1)50% of the fund’s NAV based on the Net Derivative Exposure (NDE)
            or Commitment approach; o 2)100% of the benchmark Value-at-Risk
            (VaR) on relative VAR approach; or 3)10% VAR on absolute VAR
            approach. Fund managers are expected to update the responses above
            if the actual investment in derivatives go above the below
            percentages other than on an occasional or temporary basis in
            between annual reviews. The field is expected to be refreshed at
            least annually with either the last update or review date indicated.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710316:
          type: string
          description: >-
            As of Date for Fund Intend To Use Or Invest in Derivatives entry.
            According to the PWMA the Fund manager must supply an "as of date",
            for individual distributor to determine the "freshness" of the
            information and if follow up required. The nature of this date field
            is a verification. Depending on the internal data processes the
            content of this field is not stored in the senders data base but
            populated while exporting. The field is expected to be refreshed at
            least annually with either the last update or review date indicated.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710320:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund manager
            consider the product is an investment product whose, terms, features
            and risks are not reasonably likely to be understood by a retail
            investor in the jurisdiction where the product is
            domiciled/established or distributed (> 10% of the product’s NAV
            were raised), whichever is more relevant, because of its complex
            structure? This field is to be used, if the fund is a public fund in
            a non-specified jurisdiction. To obtain a list of specified
            jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710325:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund manager
            consider this fund’s investment strategy to be complex and use
            derivatives extensively for investment purpose? This field is to be
            used, if the fund is a public fund in a non-specified jurisdiction.
            To obtain a list of specified jurisdiction please consider
            https://www.sfc.hk/web/EN/rules-and-standards/suitability-requirement/non-complex-and-complex-products/list-of-specified-jurisdictions.html.
            The field is expected to be refreshed at least annually with either
            the last update or review date indicated. More information on
            filling the fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710330:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund invest in any
            underlying investments that do not have a secondary market with
            publicly available prices? This field is to be used, if the fund is
            a public fund in a non-specified jurisdiction. To obtain a list of
            specified jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710335:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund invest in any
            underlying investments where there is no adequate and transparent
            information available to retail investors? This field is to be used,
            if the fund is a public fund in a non-specified jurisdiction. To
            obtain a list of specified jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710340:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund invest in any
            underlying investments where there is risk of losing more than the
            amount invested? This field is to be used, if the fund is a public
            fund in a non-specified jurisdiction. To obtain a list of specified
            jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710345:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund invest in any
            underlying investments where their features or investment terms
            could: - fundamentally alter the nature or risk of the underlying
            investment; or - pay-out profile includes multiple variables or
            complicated formulas to determine the return? Note: This would
            include, for example, investments that incorporate a right for the
            investment product issuer to convert the instrument into a different
            investment. This field is to be used, if the fund is a public fund
            in a non-specified jurisdiction. To obtain a list of specified
            jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710350:
          type: string
          description: >-
            Please refer to fund manager's opinion. Does the fund invest in
            underlying investments where any features or terms of the underlying
            investments might render the investment illiquid and/or difficult to
            value? This field is to be used, if the fund is a public fund in a
            non-specified jurisdiction. To obtain a list of specified
            jurisdiction please consider
            https://www.sfc.hk/en/Rules-and-standards/Suitability-requirement/Non-complex-and-complex-products/List-of-specified-jurisdictions.
            More information on filling the fields can be found in the white
            paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710360:
          type: string
          description: >-
            Does the fund intend to hold more than 50% of its NAV in
            loss-absorption products? Loss absorption products is as defined in
            HKMA Circular dated 30 Oct 2018
            (https://www.hkma.gov.hk/media/eng/doc/key-information/guidelines-and-circular/2018/20181030e2.pdf)
            and any subsequent written clarifications issued by HKMA.
            https://www.hkma.gov.hk/media/eng/doc/key-information/guidelines-and-circular/2019/20190708e1a1.pdf
            The field is expected to be refreshed at least annually with either
            the last update or review date indicated. More information on
            filling the fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710361:
          type: string
          description: >-
            As of Date for Loss Absorption Products entry. According to the PWMA
            the Fund manager must supply an "as of date", for individual
            distributor to determine the "freshness" of the information and if
            follow up required. The nature of this date field is the
            verification of the respective field's value. Depending on the
            database structure this field may not be stored, but populated while
            exporting. The field is expected to be refreshed at least annually
            with either the last update or review date indicated. More
            information on filling the fields can be found in the white paper
            under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710380:
          type: string
          description: >-
            Does the fund intend to hold more than 50% of its NAV in high-yield
            bonds as its investment strategy? High-yield bonds refer to bonds,
            which are generally below investment grade or are unrated. For more
            information please consider SFC circular on Selling of Fixed Income
            Products:
            https://www.sfc.hk/edistributionWeb/gateway/EN/circular/doc?refNo=12EC12
            The field is expected to be refreshed at least annually with either
            the last update or review date indicated. More information on
            filling the fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710381:
          type: string
          description: >-
            As of Date for High Yield Bonds entry. According to the PWMA the
            Fund manager must supply an "as of date", for individual distributor
            to determine the "freshness" of the information and if follow up
            required. The nature of this date field is the verification of the
            respective field's value. Depending on the database structure this
            field may not be stored, but populated while exporting. The field is
            expected to be refreshed at least annually with either the last
            update or review date indicated. More information on filling the
            fields can be found in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710385:
          type: string
          description: >-
            Does the fund intend to hold more than 50% of its NAV in
            insurance-linked securities (ILS)? Insurance-linked securities (ILS)
            is as defined under section 129A of the Insurance Ordinance (Cap.
            41) Further guideline as issued by HKMA & SFC circular dated 11 Oct
            2021
            (https://www.hkma.gov.hk/media/eng/doc/key-information/guidelines-and-circular/2021/20211011e1.pdf)
            (https://apps.sfc.hk/edistributionWeb/gateway/EN/circular/suitability/doc?refNo=21EC42)
        OFST710386:
          type: string
          description: >-
            As of Date for ILS entry. According to PWMA, Fund manager must
            supply an "as of date" for individual distributor to determine
            "freshness" of the information and if follow up required. The nature
            of this date field is the verification of the respective field's
            value. Depending on the database structure this field may not be
            stored, but populated while exporting. The field is expected to be
            refreshed at least annually with either the last update or review
            date indicated. More information on filling the fields can be found
            in the white paper under
            https://www.openfunds.org/knowledge/whitepapers/hong-kong-complex-and-non-complex-funds/
        OFST710405:
          type: string
          description: >-
            The maximum percentage of NAV that the fund is allowed to invest in
            High Yield Bonds. High Yield Bonds refer to bonds with ratings below
            investment grade or unrated bonds. The CNMV, the Spanish government
            agency responsible for the financial regulation of the securities
            markets in Spain, requires that funds disclose this percentage to
            their investors, in accordance with the TRLMV (Securities Markets
            Act). The full text of the act can be found on the Spanish
            government;'s website:
            https://www.boe.es/buscar/act.php?id=BOE-A-2015-11435
        OFST710410:
          type: string
          description: >-
            According to the Spanish National Securities Commission (“CNMV”)
            UCIs products need to confirm the relevant UCI classification. This
            is relevant to any fund for sale in Spain or on platforms based in
            Spain. Range of UCI classification is between 1-9 where for foreign
            UCI’s its normally between 6 and 9 (Normally your UCIs, if UCITS,
            should be classified as 8): 1 - Spanish SICAVs 2 - Spanish SICAV
            structured according to the definition of art. 36 of Regulation (EU)
            583/2010. 3 - Funds of hedge funds, funds of funds of hedge funds
            and Private Equity Funds (Spanish) 4 - Rest of non- harmonised UCIs
            (Spanish) 5 - Rest of harmonised UCIs (Spanish) 6 - Foreign
            structured UCIs or equivalent in accordance to the definition of
            art. 36 of Regulation (EU) 583/2010) 7 - Foreign UCIs regulated
            under the Directive 2011/61/EU of the European Parliament and of the
            Council of 8 June 2011 on Alternative Investment Fund Managers 8 -
            Foreign UCIs not included under the above definitions regulated
            under the Directive 2009/65/EC of the European Parliament and of the
            Council of 13 July 2009 on the coordination of laws, regulations and
            administrative provisions relating to undertakings for collective
            investment in transferable securities (UCITS) 9 - Foreign UCIs not
            included under the above definition 10 - Harmonised ETFs 11 -
            Non-harmonised ETFs Note: Harmonised UCIs should be understood as
            those constituted in accordance with Directive 2009/65/EC on
            undertakings for the collective investment in transferable
            securities. Non-harmonised are funds regulated in accordance with
            the Directive 2011/61/EU of the European Parliament and of the
            Council of 8 June 2011 on Alternative Investment Fund Managers.
        OFST720000:
          type: string
          description: >-
            The date the form was prepared. In effect, this field acts as a
            timestamp for a declaration of accuracy. This can be used to
            determine the staleness of the data in the database. //The
            correspondent RG97 field introduced in Morningstar's RG97 collection
            form ‘MDU01G015' is: Date Prepared//
        OFST720001:
          type: string
          description: >-
            The Financial Year-End Date which was used to calculate Indirect
            Costs, Transactional & Operational Costs, interposed vehicle
            Investment Fee and Performance Fee, Performance Related Costs and
            Last Financial Year Investment Fee and Performance Fee. //The
            correspondent RG97 field introduced in Morningstar's RG97 collection
            form ‘MDU01G015' is: Financial Year-End Date//
        OFST720005:
          type: string
          description: >-
            For MIS: This is the Management Fees and Costs as represented in the
            "Fees and Costs Summary" table in the PDS. Components of this figure
            are to be populated in: I010 (OFST720015), I025, I035, I045, A025, &
            O010. For Super funds: This is the Investment Fees and Costs as
            represented in the "Fees and Costs Summary" in the PDS but excludes
            the Performance Fee component (reported separately). Components of
            this figure are to be populated in: I010 (OFST720015), I025, I035, &
            I045. All: Numbers within this field will be validated against the
            those of the component fields, with a small tolerance for rounding
            errors. Note, this field excludes Performance Fee costs reported in
            P010-P016. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: M010 Investment
            Management Fees and Costs - PDS//
        OFST720006:
          type: string
          description: >-
            For MIS: This is the Management Fees and Costs as represented in an
            investors periodic statement. This field is identical to M010 except
            the investment management fee component would reflect the fees
            applicable during the last financial year rather than on a
            prospective basis. Components of this total figure are to be
            populated in: I015 (OFST720016), I025, I035, I045, A025, & O010. For
            Super funds: This is the Investment Fees and Costs as represented in
            an investors periodic statement but excludes the Performance Fee
            component (reported separately). This field is identical to S010
            except the investment management fee component would reflect the
            fees applicable during the last financial year rather than on a
            prospective basis. Components of this total figure are to be
            populated in: I015 (OFST720016), I025, I035, & I045. All: Numbers
            within this field will be validated against the those of the
            component fields, with a small tolerance for rounding errors. Note,
            this field excludes Performance Fee costs reported in P010-P016.
            //The correspondent RG97 field introduced in Morningstar's RG97
            collection form ‘MDU01G015' is: M015 Investment Management Fees and
            Costs - Last FY //
        OFST720015:
          type: string
          description: >-
            This is a component of the Management Fees and Costs - PDS for MIS
            and Investment Fees and Costs - PDS for Super funds that is
            attributable to investment management. This component excludes the
            costs arising from interposed vehicles, which is captured in I025.
            It also excludes those OTC Derivative Costs that were incurred as
            management costs, which is captured in I055. //The correspondent
            RG97 field introduced in Morningstar's RG97 collection form
            ‘MDU01G015' is: I010 Investment Management Fee - PDS//
        OFST720016:
          type: string
          description: >-
            This is a component of the Management Fees and Costs - Last FY for
            MIS and Investment Fees and Costs - Last FY for Super funds. This
            component excludes the costs arising from interposed vehicles, which
            is captured in I025. It also excludes those OTC Derivative Costs
            that were incurred as management costs, which is captured in I055.
            //The correspondent RG97 field introduced in Morningstar's RG97
            collection form ‘MDU01G015' is: I015 Investment Management Fee -
            Last FY//
        OFST720035:
          type: string
          description: >-
            For Super funds only. This is the Administration Fees and Costs as
            shown in the "Fees and Costs Summary" table in the PDS. This
            includes OTC Derivative Costs deemed to be Administration costs.
            //The correspondent RG97 field introduced in Morningstar's RG97
            collection form ‘MDU01G015' is: A010 Administration Fees and Costs -
            PDS//
        OFST720036:
          type: string
          description: >-
            For Super funds only. This is the Administration Fees and Costs that
            would appear in an investors periodic statement covering the last
            financial year. This includes OTC Derivative Costs deemed to be
            Administration costs. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: A015
            Administration Fees and Costs - Last FY//
        OFST720050:
          type: string
          description: >-
            This field is the Performance Fee shown in the "Fees and Costs
            Summary" table in the PDS. It is intended as a representation of
            potential on-going performance fee expenses and should be calculated
            as an average using the performance fee costs from the last five
            financial years (or as many as the performance fee was applicable).
            This amount includes the Performance Fee costs arising from
            Interposed Vehicles. That other amount is also explicitly reported
            as additional information in the field below (P011). Other fields in
            this form are to be used to describe the structure of the ongoing
            performance fee. Those fields are; Y010, Y020 (OFST720155), Y030,
            Y040 (OFST720165 ), Y050, Y060 (OFST720175), & Y070 //The
            correspondent RG97 field introduced in Morningstar's RG97 collection
            form ‘MDU01G015' is: P010 Performance Fee Costs - PDS//
        OFST720060:
          type: string
          description: >-
            This field is the Performance Fee that would be represented in an
            investors periodic statement covering the last financial year. This
            field includes the Performance Fee costs arising from Interposed
            Vehicles. //The correspondent RG97 field introduced in Morningstar's
            RG97 collection form ‘MDU01G015' is: P015 Performance Fee Cost -
            Last FY//
        OFST720070:
          type: string
          description: >-
            The sum of T&O Cost components after deducting the costs recovered
            via the spread. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: T010 Net Total
            Transactional & Operational Costs//
        OFST720080:
          type: string
          description: >-
            The sum of T&O Cost components before costs recovered via the spread
            have been applied. This figure is reported in the 'Additional
            Explanation …' section of the PDS. //The correspondent RG97 field
            introduced in Morningstar's RG97 collection form ‘MDU01G015' is:
            T020 Gross Total Transactional & Operational Costs//
        OFST720090:
          type: string
          description: >-
            The total amount that was recovered via the buy-sell spread of the
            fund. This figure is reported in the 'Additional Explanation …'
            section of the PDS. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: T050 Total T&O
            Costs Recovered via Spread//
        OFST720110:
          type: string
          description: >-
            Prospective Buy-Spread shown in the most recent PDS or
            Supplementary. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: U010 Buy Spread//
        OFST720115:
          type: string
          description: >-
            Prospective Sell-Spread shown in the most recent PDS or
            Supplementary. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: U020 Sell
            Spread//
        OFST720155:
          type: string
          description: >-
            The percentage of out-performance retained as the performance
            related payment. //The correspondent RG97 field introduced in
            Morningstar's RG97 collection form ‘MDU01G015' is: Y020 Performance
            Fee %//
        OFST720165:
          type: string
          description: >-
            If the performance fee structure has no HWM then choose None.
            Otherwise, indicate whether the HWM is calculated using the Total
            Return, Excess Return or Both. //The correspondent RG97 field
            introduced in Morningstar's RG97 collection form ‘MDU01G015' is:
            Y040 High-Water Mark Type//
        OFST720175:
          type: string
          description: >-
            The frequency that the High-Water Mark is set and the Performance
            Fee is paid to the manager. //The correspondent RG97 field
            introduced in Morningstar's RG97 collection form ‘MDU01G015' is:
            Y060 Crystallisation Frequency//
        OFST710151:
          type: string
          description: >-
            The Italian Reduced Rate Percentage (IRRP) as at the start of the
            calculation period (OFST710156 Italian Reduced Rate Percentage
            Calculation Period Start Date). Not to be confused with the
            applicable percentage to apply for the semester (OFST710150 Italian
            Reduced Rate Percentage).
        OFST710152:
          type: string
          description: >-
            The Italian Reduced Rate Percentage (IRRP) as at the end of the
            calculation period (OFST710155 Italian Reduced Rate Percentage
            Calculation Period End Date). Not to be confused with the applicable
            percentage to apply for the semester (OFST710150 Italian Reduced
            Rate Percentage).
        OFST710156:
          type: string
          description: >-
            The start date for the calculation period used to determine
            "OFST710150 Italian Reduced Rate Percentage". If no start date is
            available for the calculation then this field may be left blank.
        OFST710211:
          type: string
          description: >-
            The source of the data shown in OFST710210 Belgian Average Asset
            Test.
        OFST710160:
          type: string
          description: >-
            Funds with Asset Tests (Italian Whie List) equal to 0 will be
            considered "out of scope". Funds with Asset Tests different from 0
            will be considered "in scope".
        OFST710190:
          type: string
          description: >-
            Funds with Asset Tests <10% (registered in Belgium) will be
            considered "out of scope"
        OFST710195:
          type: string
          description: >-
            Funds with Asset Tests <10% (registered in Belgium) will be
            considered "out of scope"
        OFST710210:
          type: string
          description: >-
            Belgian Asset Tests are an examination of an investment fund’s
            percentage of investment in debt-claims. The proportion of each
            asset is determined by means of the book value of these assets in
            relation to the total book value of the assets of the fund. To
            calculate the asset test, the composition of the underlying assets
            is recorded on two different dates, namely that of the semi-annual
            report (six months into the fiscal year) and that of the annual
            report (fiscal year end) of the fund, and these two values are
            averaged to produce this value        
    CountryRegistrationData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/CountryRegistrationData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/CountryRegistrationItemData'
    CountryRegistrationItemData:
      type: object
      properties:
        CitiCode:
          type: string
        Isin:
          type: string
        Apir:
          type: string
        OFST6020XX:
          type: string
          description: >-
            Distribution start date in that specific country. If used as
            OFST602000 (XX replaced by number 00) file layout changes from a
            "flat file layout" to a "narrow file layout". Narrow file layout
            means that there is a separate line for each country that is
            specified in column OFST600000. In a flat file layout XX in
            OFST6020XX is replaced by the double digit ISO country code (ISO
            1366-1 alpha-2).
        OFST6021XX:
          type: string
          description: >-
            Registration end date in that specific country. If used as
            OFST602100 (XX replaced by number 00) file layout changes from a
            "flat file layout" to a "narrow file layout". Narrow file layout
            means that there is a separate line for each country that is
            specified in column OFST600000. In a flat file layout XX in
            OFST6021XX is replaced by the double digit ISO country code (ISO
            1366-1 alpha-2).
        OFST6010XX:
          type: string
          description: >-
            Registration date in that specific country. If used as OFST601000
            (XX replaced by number 00) file layout changes from a "flat file
            layout" to a "narrow file layout". Narrow file layout means that
            there is a separate line for each country that is specified in
            column OFST600000. In a flat file layout XX in OFST6010XX is
            replaced by the double digit ISO country code (ISO 1366-1 alpha-2).
        OFST6011XX:
          type: string
          description: >-
            Deregistration date in that specific country. If used as OFST601100
            (XX replaced by number 00) file layout changes from a "flat file
            layout" to a "narrow file layout". Narrow file layout means that
            there is a separate line for each country that is specified in
            column OFST600000. In a flat file layout XX in OFST6011XX is
            replaced by the double digit ISO country code (ISO 1366-1 alpha-2).
        OFST6015XX:
          type: string
          description: >-
            At the point of deregistration, if there are remaining investors in
            XX, the facility requirements and publication of the legal Fund
            documents for the class in XX must be maintained until the investors
            redeems. The "XX" within the OF-ID has to be replaced by the two
            digit country ISO code (3166-1 alpha-2). This relates to the
            requirements on deregistered Funds laid out in Directive (EU)
            2019/1160, more details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST6200XX:
          type: string
          description: >-
            Named facility in country responsible for processing subscription,
            repurchase and redemption orders and making other payments to
            unit-holders relating to the units of the UCITS. The "XX" within the
            OF-ID has to be replaced by the two digit country ISO code (3166-1
            alpha-2). This relates to the requirements laid out in Article 1 (4)
            1a of Directive (EU) 2019/1160, more details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST6210XX:
          type: string
          description: >-
            Named facility in country that provides investors with information
            on how subscriptions can be made and how repurchase and redemption
            proceeds are paid to unit-holders relating to the units of the UCITS
            The "XX" within the OF-ID has to be replaced by the two digit
            country ISO code (3166-1 alpha-2). This relates to the requirements
            laid out in Article 1 (4) 1b of Directive (EU) 2019/1160, more
            details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST6220XX:
          type: string
          description: >-
            Named facility in country for providing information and access to
            procedures relating to the investors' ability to exercise of their
            rights arising from their investment in the UCITS in the Member
            State where the UCITS is marketed The "XX" within the OF-ID has to
            be replaced by the two digit country ISO code (3166-1 alpha-2). This
            relates to the requirements laid out in Article 1 (4) 1c of
            Directive (EU) 2019/1160, more details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L116
        OFST6230XX:
          type: string
          description: >-
            Named facility in country for providing information and access to
            the latest investor disclosure documents, periodic reports, KIIDs
            etc. available for inspection. The "XX" within the OF-ID has to be
            replaced by the two digit country ISO code (3166-1 alpha-2). This
            relates to the requirements laid out in Article 1 (4) 1d of
            Directive (EU) 2019/1160, more details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST6240XX:
          type: string
          description: >-
            Named facility in country that provides investors with information
            relevant to the tasks that the facilities perform in a durable
            medium The "XX" within the OF-ID has to be replaced by the two digit
            country ISO code (3166-1 alpha-2). This relates to the requirements
            laid out in Article 1 (4) 1e of Directive (EU) 2019/1160, more
            details can be found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST6250XX:
          type: string
          description: >-
            Named facility in country responsible for being the contact point
            for communicating with the XX’s competent authority. The "XX" within
            the OF-ID has to be replaced by the two digit country ISO code
            (3166-1 alpha-2). This relates to the requirements laid out in
            Article 1 (4) 1f of Directive (EU) 2019/1160, more details can be
            found at
            https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019L1160
        OFST9024XX:
          type: string
          description: >-
            Registration status in the e-file system: X - Not registered E - To
            be registered A - Registration in progress (selection of an
            instrument at step 2 of the Notification) AT - Registration in
            progress - Transmitted to the authority AR - Registration in
            progress - Rejected by the authority N - Notified NT - Notified -
            Transmitted to the HOST authority NR - Notified - Rejected by the
            HOST authority NA - Notified - Accepted by the HOST authority R -
            Registered RI - Registered - Institutional RP - Registered - Private
            placement RX - No more registered
        OFST9025XX:
          type: string
          description: >-
            Distribution status in the e-file system: X - Not distributed D -
            Distributed DX - No more distributed
        OFST6030XX:
          type: string
          description: >-
            Distribution start date in that specific country. If used as
            OFST602000 (XX replaced by number 00) file layout changes from a
            "flat file layout" to a "narrow file layout". Narrow file layout
            means that there is a separate line for each country that is
            specified in column OFST600000. In a flat file layout XX in
            OFST6020XX is replaced by the double digit ISO country code (ISO
            1366-1 alpha-2).
        OFST6031XX:
          type: string
          description: >-
            Registration end date in that specific country. If used as
            OFST602100 (XX replaced by number 00) file layout changes from a
            "flat file layout" to a "narrow file layout". Narrow file layout
            means that there is a separate line for each country that is
            specified in column OFST600000. In a flat file layout XX in
            OFST6021XX is replaced by the double digit ISO country code (ISO
            1366-1 alpha-2).
        OFST900224:
          type: string
          description: >-
            FE fundinfo share class identifier. The field is allowed to be up to
            15 characters in length, but all current codes used are 5-6
            characters long.
        OFST9001XX:
          type: string
          description: >-
            Distribution start date in that specific country. If used as
            OFST602000 (XX replaced by number 00) file layout changes from a
            "flat file layout" to a "narrow file layout". Narrow file layout
            means that there is a separate line for each country that is
            specified in column OFST600000. In a flat file layout XX in
            OFST6020XX is replaced by the double digit ISO country code (ISO
            1366-1 alpha-2).
        OFSTCOUNTRYID:
          type: string
    PortfolioManagerData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/PortfolioManagerDataResult'
    PortfolioManagerDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFPM000008:
          type: string
          description: >-
            If the portfolio manager (OFPM000010 Portfolio Manager Name) is a
            person with a first and last name (as opposed to a business,
            algorithm, or other non-human entity) their forename(s) should be
            listed here, 
              such that OFPM000008 Portfolio Manager Forename and OFPM000010 Portfolio Manager Name together with an interstitial space constitute the full name of the manager. 
              Where not relevant, this field should be left blank.
        OFPM000010:
          type: string
          description: >-
            Name of the portfolio manager. If this is a single person then only
            their surname/family name should be listed here,  with their
            forename listed against OFPH000008 Portfolio Manager Forename.  If
            this is a team or other non-person entity then the relevant name
            (e.g. "Team") may be listed here.

            Please note that openfunds does not give any legal advice.  Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).
        OFPM000020:
          type: string
          description: >-
            Portfolio manager's year of birth, if relevant (i.e. where the
            portfolio manager is a single person with a single year of birth). 
            This field is linked to field "OFPM000010 Portfolio Manager Name".

            Please note that openfunds does not give any legal advice.  Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).
        OFPM000040:
          type: string
          description: >-
            When did the portfolio manager start their professional career in
            the financial industry?  This field is linked to field "OFPM000010
            Portfolio Manager Name".

            Please note that openfunds does not give any legal advice.  Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).
        OFPM000060:
          type: string
          description: >-
            A brief curriculum vitae (CV) of the portfolio manager.  This field
            is linked to field "OFPM000010 Portfolio Manager Name".

            Please note that openfunds does not give any legal advice. Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).

            This field's OF-ID can also include a language tag, i.e.
            OFPM000060(zh-Hant) for Portfolio Manager Brief Biography written in
            traditional Chinese.  For more information please refer to
            https://www.openfunds.org/en/language-tags.
        OFPM000111:
          type: string
          description: >-
            Role of the portfolio manager. If the fund is managed with a strict
            team approach, please use "lead" for all team members. lead - the
            manager is either the primary manager, co-lead, or a member of a
            team of managers of the fund. deputy - the manager is a deputy
            manager to one or more lead managers product specialist - the
            manager has a mixed role of managing and marketing the fund Please
            note that openfunds does not give any legal advice.  Please also
            note that the processing of personal data shall be in compliance
            with the GDPR (General Data Protection Regulation).
        OFPM000120:
          type: string
          description: >-
            When did the portfolio manager start managing the fund in this role?
            This field is linked to the portfolio manager's role ("OFPM000111
            Portfolio Manager Type").

            Please note that openfunds does not give any legal advice.  Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).
        OFPM000125:
          type: string
          description: >-
            The date, when the portfolio manager was no longer managing the fund
            in this specific role.  This might be because the role of the
            portfolio manager has changed or because the portfolio manager has
            stopped managing this fund.

            Please note that openfunds does not give any legal advice.  Please
            also note that the processing of personal data shall be in
            compliance with the GDPR (General Data Protection Regulation).
        OFPM900001:
          type: string
        OFPM900010:
          type: string
        OFPM900020:
          type: number
        OFPM900025:
          type: string
    PurchaseInformationData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/PurchaseInformationDataResult'
    PurchaseInformationDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFST400200:
          type: string
          description: >-
            Initial investments into a share class may be subject to a minimum
            requirement, as set forth in the prospectus – such as buying a
            specific number of shares, or also by investing a specific amount of
            money. A subscription requirement for a specific amount of money
            usually implies that one can invest in fractions of a share class
            unit, so long as the minimum amount of money is met. For instance,
            assume that a share class of a fund costs 125 currency units. If
            investors are required to buy a specific number of shares, "shares"
            is the right choice. If, however, the requirement is to invest 200
            currency units, then "amount" is the answer.
              In exceptional cases the prospectus mentions different requirements for initial and subsequent subscriptions. For example, a minimum of 1,000 currency units are required for initial subscription, and subsequent subscriptions must be of at least 10 shares. Such combination is reflected as "shares and amount". In case the prospectus only mentions as an example: “Minimum investment is 10,000 currency units or equivalent in shares…”, openfunds expects indication of “amount” only.
              In case there is no minimal subscription neither for initial nor for subsequent subscriptions, please choose "shares and amount" and insert the number '0' (zero) into the following linked fields
              OFST400220 Minimal Initial Subscription In Shares
              OFST400250 Minimal Subsequent Subscription In Shares
              OFST400230 Minimal Initial Subscription In Amount
              OFST400260 Minimal Subsequent Subscription In Amount
        OFST400220:
          type: string
          description: >-
            If subscriptions are only in shares: what is the minimum number of
            shares for new investments?
              In case there is no minimal subscription neither for initial nor for subsequent subscriptions, please choose "shares and amount" for the linked field "OFST400200 Minimal Subscription Category" and insert the number '0' (zero) into this field.
        OFST400230:
          description: >-
            If subscriptions have to be done in amount: what is the minimum
            amount for an initial investment in the mentioned currency? Please
            note, that the amount could be as low as one currency unit or as
            high as several millions of a currency unit. Please indicate the
            currency in field "OFST400240 Currency Of Minimal Subscription".
              In case there is no minimal subscription neither for initial nor for subsequent subscriptions, please choose "shares and amount" for the linked field "OFST400200 Minimal Subscription Category" and insert the number '0' (zero) into this field.
        OFST400240:
          type: string
          description: |-
            Currency of amounts provided in the fields:
              OFST400230 Minimal Initial Subscription In Amount
              OFST400260 Minimal Subsequent Subscription In Amount
              The currency provided in this field is not necessarily the same as OFST020540 Share Class Currency.
        OFST400245:
          type: string
          description: >-
            Subsequent investments into a share class may be subject to a
            minimum requirement, as set forth in the prospectus – such as buying
            a specific number of shares, or also by investing a specific amount
            of money. A subscription requirement for a specific amount of money
            usually implies that one can invest in fractions of a share class
            unit, so long as the minimum amount of money is met. For instance,
            assume that a share class of a fund costs 125 currency units. If
            investors are required to buy a specific number of shares, "shares"
            is the right choice. If, however, the requirement is to invest 200
            currency units, then "amount" is the answer.
        OFST400250:
          type: string
          description: >-
            If subsequent subscriptions are in shares: what is the minimum
            number of shares for an additional investment?
        OFST400260:
          type: string
          description: >-
            If subscriptions have to be done in amount: what is the minimum
            amount for a subsequent investment?
        OFST401002:
          type: string
          description: >-
            In general there are "Dual Pricing Funds" and "Single Pricing
            Funds".
              The value "dual pricing" refers to a fund, which calculates two NAVs, firstly the so-called "offer price", a NAV for subscribers derived from underlying security offer prices and secondly the so-called "bid price", a NAV for redeemers, derived from underlying security bid prices.
              A "single pricing" fund calculates only one single NAV per share, which is used for all capital activities regardless whether inflows or outflows are affected. However there are three different main methods for calculating the single NAV. Therefore, if it is a single pricing fund, please also fill out field "OFST401003 Single Pricing Type".
        OFST401003:
          description: >-
            The list of values for this data point are (a) "no swing NAV", (b)
            "full swing NAV" and (c) "partial swing NAV". They refer to the
            Value "single pricing" in field "OFST401002 Pricing Methodology".
              "no swing NAV": A fund which calculates only one single NAV per share which is used for all capital activities and does not apply a swing factor.
              "full swing NAV": The unswung NAV is adjusted each time there is capital activity, irrespective of its size or significance to the fund. The direction of the swing is determined by the net capital activity of the day.
              "partial swing NAV": The NAV only swings if a predetermined net capital activity threshold (the swing threshold) is exceeded on a dealing day. As with full swing the direction of the swing is determined by the net capital activity of the day. Partial swing can also be referred to as semi-swing pricing.
              In the cases (b) and (c) above the two resulting NAV are also referred to as the transaction price (swing price) and the valuation price (unswung price).
        OFST401150:
          type: string
          description: >-
            The estimated TAE (La Tasa Anual Equivalente, the annual percentage
            rate of charge (APR) in Spain) that investors can reasonably expect
            to obtain when subscribing to a Guaranteed fund with a Buy and Hold
            strategy.
              Relevant to "Guaranteed" (Buy & Hold) funds.
        OFST401155:
          type: string
          description: >-
            If the fund does not assess its positions held in financial
            derivative instruments during the IPO ("non-valuation") period the
            NAV may change significantly on the first valuation day. This field
            shows the percentage decrease in the valuation price between the
            initial NAV and that following the IPO period. This should only be
            included if the percentage decrease exceeds 5%, or if it does not
            exceed that but the decrease is greater than 0.6% multiplied by the
            number of years of duration of the strategy.
              Relevant to "Guaranteed" (Buy & Hold) funds, leave blank if not applicable.
        OFST402500:
          type: string
          description: >-
            Maximal number of decimals used for transactions for this specific
            share classes.
        OFST402550:
          type: string
          description: >-
            Maximal number of decimals used for transactions instructed in
            amount for this specific share class.
        OFST402600:
          type: string
          description: >-
            Maximal number of decimals used for NAV calculations, assuming that
            this figure is equal for all kind of NAVs calculated for this
            specific share class, e.g. valuation price, transaction price
            (single pricing) or bid and ask price with dual priced share
            classes.
        OFST410075:
          type: string
          description: >-
            The Calculation Date Offset is defined as the difference in days
            between the closing/valuation date for the trade and the date on
            which the valuation is calculated. The closing date is the date on
            which the prices of underlying holdings are determined.
              This field shows the offset for redemption trades, for subscriptions please use OFST410070 Calculation Date Offset for Subscription, even if the value is the same as that in this field.
        OFST430150:
          type: string
          description: >-
            How many days are needed to settle a redemption of this fund after
            the closing/valuation date, i.e. how many days does it take after
            valuation until the cash is transferred to the sellers account ?
            Please choose calendar or business days in field "OFST430200
            Calendar Or Business Days For Transactions".
        OFST430300:
          type: string
          description: >-
            The minimum remaining amount set out in the prospectus. If a
            shareholder drops below this minimum, the Management Company
            reserves the right to redeem the client's position.
        OFST430310:
          type: string
          description: >-
            The currency of the minimum remaining amount set out in the
            prospectus.
        OFST402610:
          type: string
          description: >-
            The type of rounding method for prices for this specific share
            class.
              mathematical: If a number or decimal position is equal to or is higher than 5, it is rounded up. If a number or decimal position is less than 5, it is rounded down (i.e. 1.234 rounded as 1.23 and 1.235 rounded as 1.24).
              up: Number is rounded up (i.e. 1.234 rounded as 1.24)
              down: Number is rounded down (i.e. 1.235 rounded as 1.23).
        OFST402615:
          type: string
          description: >-
            The type of rounding method for amount on subscriptions for this
            specific share class.
              mathematical: If a number or decimal position is equal to or is higher than 5, it is rounded up. If a number or decimal position is less than 5, it is rounded down (i.e. 1.234 rounded as 1.23 and 1.235 rounded as 1.24).
              up: Number is rounded up (i.e. 1.234 rounded as 1.24)
              down: Number is rounded down (i.e. 1.235 rounded as 1.23).
        OFST402620:
          type: string
          description: >-
            The type of rounding method for shares on subscriptions for this
            specific share class.
              mathematical: If a number or decimal position is equal to or is higher than 5, it is rounded up. If a number or decimal position is less than 5, it is rounded down (i.e. 1.234 rounded as 1.23 and 1.235 rounded as 1.24).
              up: Number is rounded up (i.e. 1.234 rounded as 1.24)
              down: Number is rounded down (i.e. 1.235 rounded as 1.23).
        OFST402630:
          type: string
          description: >-
            The type of rounding method for amount on redemptions for this
            specific share class.
              mathematical: If a number or decimal position is equal to or is higher than 5, it is rounded up. If a number or decimal position is less than 5, it is rounded down (i.e. 1.234 rounded as 1.23 and 1.235 rounded as 1.24).
              up: Number is rounded up (i.e. 1.234 rounded as 1.24)
              down: Number is rounded down (i.e. 1.235 rounded as 1.23).
        OFST402635:
          type: string
          description: >-
            The type of rounding method for shares on redemptions for this
            specific share class.
              mathematical: If a number or decimal position is equal to or is higher than 5, it is rounded up. If a number or decimal position is less than 5, it is rounded down (i.e. 1.234 rounded as 1.23 and 1.235 rounded as 1.24).
              up: Number is rounded up (i.e. 1.234 rounded as 1.24)
              down: Number is rounded down (i.e. 1.235 rounded as 1.23).
        OFST405540:
          type: string
          description: >-
            Advise whether the Share Class applies an early cut-off any day
            during the year, for example the day before a public holiday. If
            yes, please indicate when the partial day/early cut-offs will apply
            in the field OFST405545 Partial Dealing Days Date and Time.
        OFST405550:
          type: string
          description: >-
            Whether the Share Class applies an early cut-off for payments any
            day during the year. If yes, please indicate when the half day/early
            payment cut-offs will apply in the field OFST405555 Partial Payment
            Days Date and Time.
        OFST405555:
          type: string
          description: >-
            If the field OFST405550 Does Share Class Apply Partial Payment Days
            is "yes", please indicate dates and times where the half day/early
            payment cut-offs will apply. The separator between dates will be a
            pipe "|" (ASCII 124) symbol in case there is more than one date to
            be informed.
        OFST405600:
          type: string
          description: >-
            Pre-notice cut-off time for subscriptions. Additionally, it is
            necessary to mention the appropriate time zone in field "OFST410090
            Time Zone For Cut-off" or "OFST410092 Time Zone For Cut-off Using TZ
            Database".
        OFST410060:
          type: string
          description: >-
            The Cut-off Date Offset for Subscription corresponds to the cut-off
            date on which the investor has to place the order in order to
            subscribe. For hedge funds often referred to as notice period. If
            the investor has to place the order one day prior to the intended
            valuation date for the subscription, the expected value is 1. This
            field shows the offset for subscription trades, for redemptions
            please use OFST410065 Cut-off Date Offset for Redemption, even if
            the value is the same as that in this field.
        OFST410090:
          type: string
          description: >-
            Relevant time zone for "OFST410100 Cut-off Time For Subscription" or
            "OFST430100 Cut-off Time For Redemption" in local standard time
            format.

            Helpful links can be found at: -
            https://en.wikipedia.org/wiki/List_of_time_zones_by_country -
            https://en.wikipedia.org/wiki/Coordinated_Universal_Time -
            https://www.timeanddate.com/time/zones -
            https://en.wikipedia.org/wiki/Daylight_saving_time -
            https://en.wikipedia.org/wiki/Tz_database

            Commonly used standard time formats are: - EST Eastern Time Zone
            (USA); UTC-05:00 - CST Central Time Zone (USA); UTC-06:00 - PST
            Pacific Time Zone (USA); UTC-07:00 - CET Central European Time;
            UTC+01:00 - HKT Hong Kong Time; UTC+08:00 - SST Singapore Standard
            Time; UTC+08:00

            Please note, that mentioning the abbreviation of a standard time
            zone is an approximation as there are many countries that know
            daylight saving time. In this case openfunds would assume only
            mentioning one abbreviation, e.g. CET for Central European Time,
            despite between March and October it should be CEST for Central
            European Summer Time. Additionally, openfunds recommends not to use
            this field for automatic implementation, as there are quite some
            identical abbreviations for different time zones, e.g. ADT stands
            for Arabia Daylight Time (UTC+3:00) or Atlantic Daylight Time
            (UTC-3:00). For automatic information exchange please refer to
            "OFST410092 Time Zone For Cut-off Using TZ Database"
        OFST410092:
          type: string
          description: >-
            The tz database, also called Olson database or IANA time zone
            database, is a public domain database including information about
            the world's time zones. It uses a naming convention that focuses on
            cities instead of countries, e.g. America/New_York,
            America/Indiana/Indianapolis, Asia/Kolkata or Europe/Paris. Further
            information can be found on
            https://en.wikipedia.org/wiki/Tz_database#Definition_of_a_time_zone.
            For technical implementation http://www.joda.org/joda-time/ (Java)
            or http://nodatime.org/ (.NET) could be good starting points. A list
            of tz database time zones can be found here:
            https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
        OFST410100:
          type: string
          description: >-
            Provider cut-off time (deadline order placement) [hh:mm].
            Additionally, it is necessary to mention the appropriate time zone
            in field "OFST410090 Time Zone For Cut-off" or "OFST410092 Time Zone
            For Cut-off Using TZ Database".
        OFST410700:
          type: string
          description: >-
            How many days are needed to settle a subscription to this fund after
            the closing/valuation date, i.e. how many days does it take after
            valuation until the fund is transferred to the buyers securities
            account? Please choose calendar or business days in field
            "OFST430200 Calendar Or Business Days For Transactions".
        OFST410950:
          type: string
          description: Indicates if the fund has a lock-up period for early redemption.
        OFST410952:
          type: string
          description: >-
            Free text to specify the lock-up. Please also include the kind of
            lock-up, i.e. if soft with a penalty or hard without the option for
            early redemption.
        OFST420200:
          type: string
          description: >-
            Is it possible to redeem an amount of money? This usually assumes
            fractions of units.
        OFST420240:
          type: string
          description: |-
            Currency of amounts provided in the fields:
              OFST420230 Minimal Initial Redemption In Amount
              OFST420235 Maximum Initial Redemption In Amount
              OFST420260 Minimal Subsequent Redemption In Amount
              OFST420265 Maximum Subsequent Redemption In Amount
              The currency provided in this field is not necessarily the same as OFST020540 Share Class Currency.
        OFST420250:
          type: string
          description: >-
            If redemptions have to be done in shares: what is the minimum number
            of shares for a subsequent redemption?
        OFST420255:
          type: string
          description: >-
            If redemptions have to be done in shares: what is the maximum number
            of shares for a subsequent redemption?
        OFST420260:
          type: string
          description: >-
            If redemptions have to be done in amount: what is the minimum amount
            in the specified currency for a subsequent redemption?
        OFST420265:
          type: string
          description: >-
            If redemptions have to be done in amount: what is the maximum amount
            in the specified currency for a subsequent redemption?
        OFST420630:
          type: string
          description: >-
            The BIC (Bank Identification Code) of the beneficiary bank and the
            IBAN code related to Standard Settlement Instructions (SSI) to
            settle the subscription amounts to be paid in the share class in
            question.
        OFST420635:
          type: string
          description: >-
            The level at which the bank details provided in OFST420630 Bank
            Details (SSI For payments) Provision are applicable.
        OFST420700:
          type: string
          description: >-
            How many days are needed to settle a switch in to this share class
            after the trade date, i.e. how many days does it take until the fund
            is transferred to the buyer's securities account? Please choose
            calendar or business days in field "OFST430200 Calendar Or Business
            Days For Transactions".
        OFST430200:
          type: string
          description: >-
            This field defines whether a period of days, e.g. for settlement or
            notification refers to calendar days or to business days.
        OFST440150:
          type: string
          description: >-
            How many days are needed to settle a switch out of this share class
            after the trade date, i.e. how many days does it take until the fund
            is transferred to the buyer's securities account? Please choose
            calendar or business days in field "OFST430200 Calendar Or Business
            Days For Transactions".
        OFST430305:
          type: string
          description: >-
            The minimum remaining shares set out in the prospectus. If a
            shareholder drops below this minimum, the Management Company
            reserves the right to redeem the client´s position.
        OFST430315:
          type: string
          description: >-
            If the prospectus defines a minimum remaining investment for an
            investor, whether this minimum is quoted in shares (OFST430305),
            amount (OFST430300), or both.
        OFST410065:
          type: string
          description: >-
            The Cut-off Date Offset for Redemption corresponds to the cut-off
            date on which the investor has to place the order in order to
            redeem. For hedge funds often referred to as notice period. If the
            investor has to place the order one day prior to the intended
            valuation date for the redemption, the expected value is 1. This
            field shows the offset for redemption trades, for subscriptions
            please use OFST410060 Cut-off Date Offset for Subscription, even if
            the value is the same as that in this field.
        OFST405545:
          type: string
          description: >-
            If the field OFST405540 Does the Share Class Apply Partial Dealing
            Days is yes, please indicate dates and times where the partial
            day/early cut-offs will apply. This field can have multiple values,
            which should be given separated by a pipe "|" (ASCII 124) symbol.
        OFST401005:
          type: string
          description: >-
            The swing factor is the percentage by which "OFDY000035 Valuation
            NAV" is adjusted in order to protect existing investors in a fund
            from the cost of trading securities as a result of capital activity.
            It takes into account spreads, transaction costs and relevant taxes.
            The swing factor is triggered as a result of capital activity
            exceeding a pre-defined threshold ("OFST401003 Single Pricing Type"
            = "partial swing NAV") or any capital activity ("OFST401003 Single
            Pricing Type" = "full swing NAV"        
    TaxesData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/TaxesDataResult'
    TaxesDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFST801011:
          type: string
          description: >-
            If the fund is a tax reporting fund the value of this field should
            be "yes". 
              If it is a non-tax reporting fund please answer with "no". 
              This replaces the former "bluetenweiss" or "weiss" etc.
              The relevant paragraphs can be found at (only in German)>-
              http>-//www.gesetze-im-internet.de/invstg_2018/BJNR173010016.html#BJNR173010016BJNG000100000
        OFST802001:
          type: string
          description: >-
            Is the fund an investment fund according to §1 of the German
            Investment Tax Act (Investmentsteuergesetz, InvStG)?  If the fund is
            not subject to the German Investment Tax Act, the answer is no.
        OFST802005:
          type: string
          description: >-
            Is the fund without domestic income in Germany?  If an investment
            fund does NOT generate domestic income in Germany as per §6 (3) –
            (5) of the German investment tax act,  the fund is not subject to
            the German Investment Tax Act and no application as per §8 for the
            exemption of income as per §6 (2) needs to be made. The relevant
            paragraphs can be found at (only in German):
            https://www.buzer.de/gesetz/12129/a199918.htm
            https://www.buzer.de/gesetz/12129/a199920.htm
        OFST802015:
          type: string
          description: >-
            Which tax procedure applies according to German investment tax act? 
            The possible procedures are Public Fund or Special Investment Fund.
        OFST802020:
          type: string
          description: >-
            Is this Fund a fund with tax exemption due to tax-privileged
            investors as per §8 of the German Investment Tax Act?
             The relevant paragraph can be found at (only in German):
             https://www.buzer.de/s1.htm?a=%C2%A7+8&g=&kurz=InvStG&ag=12129
        OFST802025:
          type: string
          description: >-
            The German Fund Category depends on the fund's capital participation
            ratio (in German "Kapitalbeteiligungsquote").  Further, this
            category defines what kind of tax reduction the investor may apply
            on the fund's distribution of dividends,  advanced lump sum and
            price profits. - "Equity Funds": at least 51% of fund's value in
            equity shares, tax reduction: 30% - "Mixed Funds": at least 25% of
            fund's value in equity shares, tax reduction: 15% - "German Real
            Estate Fund": at least 51% of fund's value in domestic real estate
            or real estate    related business, tax reduction: 60% - "Foreign
            Real Estate Fund": at least 51% of fund's value in foreign real
            estate or real estate related business, tax reduction: 80%
             - "Other Funds": no tax reduction
             The relevant paragraph can be found at (only in German):
             https://www.buzer.de/s1.htm?a=%C2%A7+20&g=&kurz=InvStG&ag=12129
        OFST802030:
          type: string
          description: >-
            Does the Special Investment Fund meet the requirements of § 26 no. 4
            letter H? The relevant paragraph can be found at (only in German):
            https://www.buzer.de/s1.htm?a=%C2%A7+26&g=&kurz=InvStG&ag=12129
        OFST802035:
          type: string
          description: >-
            Is the transparency option exercised as defined in paragraph 30 and
            31? The relevant paragraphs can be found at (only in German):
            https://www.buzer.de/s1.htm?a=%C2%A7+30&g=&kurz=InvStG&ag=12129
            https://www.buzer.de/s1.htm?a=%C2%A7+31&g=&kurz=InvStG&ag=12129
        OFST802040:
          type: string
          description: >-
            The transparency option can be exercised for domestic share and
            real-estate income, domestic share income, or domestic real-estate
            income. The relevant paragraphs can be found at (only in German):
            https://www.buzer.de/s1.htm?a=%C2%A7+30&g=&kurz=InvStG&ag=12129
            https://www.buzer.de/s1.htm?a=%C2%A7+31&g=&kurz=InvStG&ag=12129
        OFST802045:
          type: string
          description: >-
            Has the fund a tax exemption for the business tax (in German
            Gewerbesteuer)? The relevant paragraph can be found at (only in
            German):
            https://www.buzer.de/s1.htm?a=%C2%A7+15&g=&kurz=InvStG&ag=12129
        OFST802500:
          type: string
          description: >-
            Has this share class a reduced taxe d'abonnement? Only applicable
            for Luxembourg domiciled funds ("OFST010010 Fund Domicile Alpha-2" =
            LU).
        OFST802501:
          type: string
          description: >-
            Tax rate of Luxembourg taxe d'abonnement, a registration fee
            established on the negotiability of securities issued by
            Undertakings for Collective Investment (UCI),  Specialised
            Investment Funds (SIF), Reserved Alternative Investment Funds
            (RAIF),  and Family Wealth Management Companies (sociétés de gestion
            de patrimoine familial - SPF).  The declaration and payment of the
            tax must be made each quarter. Funds meeting the following
            conditions are exempt from this tax: - Shares/units of the fund must
            be available exclusively to institutional investors (1). If a fund
            has several share/unit classes, the exemption will be available only
            to classes the shares/units of which are available exclusively to
            institutional investors. - The exclusive investment objective of the
            fund must be investment in money market instruments and the placing
            of deposits with credit institutions; - The weighted residual
            maturity of the fund’s portfolio must not exceed 90 days; and - The
            fund must have received the highest rating from a recognized rating
            agency. (1) Institutional investors for this purpose include
            financial professionals (including banks, insurance companies,
            investment funds, pension funds, local authorities, industrial and
            financial groups) acting for their own account, and financial
            professionals investing in their own name but on behalf of others,
            subject to the investments being made pursuant to a discretionary
            asset management mandate and the client of the financial
            professional not having any right or claim directly against the
            fund. High net worth individuals are not institutional investors.
             More information may be found at https://guichet.public.lu/en/entreprises/sectoriel/organisme-placement-collectif/taxe-abonnement.h            tml
        OFST808008:
          type: string
          description: >-
            Has the required data been delivered to the Swiss Tax Authorities?
            (Kurslisten Direkte Bundessteuer –
            https>-//www.ictax.admin.ch/extern/de.html#/ratelist).
        OFST808100:
          type: string
          description: >-
            Does the fund fulfil the requirements for 'traspaso'? For that the
            fund has to be registered in Spain (OFST6030ES = yes) and if it is
            not a FCP but a SICAV there must be more than 500 investors.  This
            fiscal regulation applies only to international regulated funds
            (=SICAVs) registered for sale in Spain.  The number is counted at
            fund level. Thus, if a fund has in total more than 500 shareholders
            ALL shares classes (provided they are registered in Spain) are
            considered capital gain tax exempt.  The Spanish word "traspaso"
            makes reference to transfer implying money can be transferred
            between funds without paying capital gain tax. Please be aware, that
            all Spanish domestic funds and all FCPs registered in Spain must be
            set to "yes" by default.
        OFST808500:
          type: string
          description: |-
            Does the fund fulfil the requirements to be PEA-eligible? 
             This means that the fund must be made up of a permanently minimum 75% of shares in companies that are headquartered in the European Community.
        OFST809015:
          type: string
          description: >-
            "yes" = If the fund has applied (already confirmed by HMRC) for or
            is intending to apply for the reporting fund status in the UK. This
            field is applicable only for non-UK domiciled funds. However, for
            legacy reasons this boolean field must be filled out. Therefore,  UK
            domiciled funds will default to yes.
        OFST809020:
          type: string
          description: >-
            Start date of UK reporting status. In case the fund is domiciled in
            the UK please fill in the fund's OFST010240 Launch Date instead.
        OFST809022:
          type: string
          description: End date of UK reporting status.
        OFST809050:
          type: string
          description: >-
            Confirmation that excess amount of interests minus distributed
            amount will be nil (Reg 92(b) SI 2009/3001). For more information
            please consider The Offshore Funds (Tax) Regulations:
            http://www.legislation.gov.uk/uksi/2009/3001/pdfs/uksi_20093001_en.pdf
        OFST809200:
          type: string
          description: >-
            US Taxation - Does the investment fund require investors to deliver
            US tax forms (W-8, W-9)?
        OFST809250:
          type: string
          description: >-
            US Taxation - Is the investment fund treated as flow-through entity
            (e.g. partnership) according to US tax law?
        OFST809511:
          type: string
          description: >-
            Please insert the FATCA status as given by the Internal Revenue
            Service (IRS) Source: W-8BEN-E (Rev. July 2017) Format: Closed
            Field"Nonparticipating FFI (including an FFI related to a Reporting
            IGA FFI other than a deemed-compliant FFI, participating FFI, or
            exempt beneficial owner)" "Participating FFI" "Reporting Model 1
            FFI" "Reporting Model 2 FFI" "Registered deemed-compliant FFI (other
            than a reporting Model 1 FFI, sponsored FFI, or nonreporting IGA FFI
            covered in Part XII)" "Sponsored FFI" "Certified deemed-compliant
            nonregistering local bank" "Certified deemed-compliant FFI with only
            low-value accounts" "Certified deemed-compliant sponsored, closely
            held investment vehicle" "Certified deemed-compliant limited life
            debt investment entity" "Certain investment entities that do not
            maintain financial accounts" "Owner-documented FFI" "Restricted
            distributor" "Nonreporting IGA FFI" "Foreign government, government
            of a U.S. possession, or foreign central bank of issue"
            "International organization" "Exempt retirement plans" "Entity
            wholly owned by exempt beneficial owners" "Territory financial
            institution" "Excepted nonfinancial group entity" "Excepted
            nonfinancial start-up company" "Excepted nonfinancial entity in
            liquidation or bankruptcy" "501(c) organization" "Nonprofit
            organization" "Publicly traded NFFE or NFFE affiliate of a publicly
            traded corporation" "Excepted territory NFFE" "Active NFFE" "Passive
            NFFE" "Excepted inter-affiliate FFI" "Direct reporting NFFE"
            "Sponsored direct reporting NFFE" "Account that is not a financial
            account" For further information please refer to:
            https://www.irs.gov/Businesses/Corporations/Foreign-Account-Tax-Compliance-Act-FATCA
        OFST809520:
          type: string
          description: >-
            Please mention whether the Fund, Hedge Fund or ETF is subject to
            FATCA, i.e. receiving interests, dividends, coupons in USD or
            payments in USD subject to US Withholding Tax including USD
            denominated share classes.
        OFST800052:
          type: string
          description: >-
            Does the fund report the tax status of the "European Directive on
            Taxation of Savings" to SIX Telekurs?  - Please mention, if the
            taxable income per share (TIS), respectively taxable income at
            distribution (TID) are reported to SIX Telekurs.
        OFST808010:
          type: string
          description: >-
            This field is for ETFs only and shows, whether there is a tax ruling
            from the Swiss Authorities.
    SolvencyData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/FeesData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/SolvencyDataResult'
    SolvencyDataResult:
      type: object
      properties:
        CitiCode:
          type: string
          description: >-
            FE fundinfo unit identifier, called Citi Code. The field is allowed
            to be up to 15 characters in length, but all current codes used are
            4-5 characters long.
        Isin:
          type: string
          description: >-
            International Securities Identification Number (ISIN) of the share
            class (e.g. LU0000000000). Please take good care, that an ISIN may
            include only upper case letters.
        Apir:
          type: string
        OFST900171:
          type: string
          description: >-
            FE fundinfo identifier for fund. The field is allowed to be up to 15
            characters in length, but all current codes used are 5-6 characters
            long.
        OFST500010:
          type: string
          description: >-
            Is there a Tripartite Report available for the share class?  See the
            details at
            https://www.theinvestmentassociation.org/investment-industry-information/current-initiatives/solvency-ii.html
        OFST500012:
          type: string
          description: >-
            Last available date of the Tripartite Report.  The correspondent
            Tripartite field is 7_Reporting date
        OFST500020:
          type: string
          description: >-
            This field relates to the European Solvency II insurance
            regulation.  Solvency Capital Requirement for the risk of an
            increase in the term structure of interest rates.  The details of
            the calculation set out in Subsection 2 of Section 5 of the
            Delegated Regulation 2015/35.  The value should be given as a
            percentage amount of the total net assets of the share class.  To
            obtain this figure, the values of the TPT's column
            “97_SCR_Mrkt_IR_up weight over NAV” have to be summed up.  The
            correspondent Tripartite field is 97_SCR_Mrkt_IR_up weight over NAV
        OFST500022:
          type: string
          description: >-
            This field relates to the European Solvency II insurance
            regulation.  Solvency Capital Requirement for the risk of a decrease
            in the term structure of interest rates.  The details of the
            calculation set out in Subsection 2 of Section 5 of the Delegated
            Regulation 2015/35.  The value should be given as a percentage
            amount of the total net assets of the share class.  To obtain this
            figure, the values of the TPT's column “98_SCR_Mrkt_IR_down weight
            over NAV” have to be summed up.  The correspondent Tripartite field
            is 98_SCR_Mrkt_IR_down weight over NAV
        OFST500031:
          type: string
          description: >-
            Solvency Capital Requirement for Type I equities.  The details of
            the calculation set out in Subsection 3 of Section 5 of the
            Delegated Regulation 2015/35.  The value should be given as a
            percentage amount of the total net assets of the share class.  To
            obtain this figure, the values of the TPT's column
            “99_SCR_Mrkt_Eq_type1 weight over NAV” have to be summed up.
             The correspondent Tripartite field is 99_SCR_Mrkt_Eq_type1 weight over NAV
        OFST500032:
          type: string
          description: >-
            Solvency Capital Requirement for Type II equities.  The details of
            the calculation set out in Subsection 3 of Section 5 of the
            Delegated Regulation 2015/35.  The value should be given as a
            percentage amount of the total net assets of the share class.
             To obtain this figure, the values of the TPT's column “100_SCR_Mrkt_Eq_type2 weight over NAV” have to be summed up. 
             The correspondent Tripartite field is 100_SCR_Mrkt_Eq_type2 weight over NAV
        OFST500040:
          type: string
          description: >-
            Solvency Capital Requirement for properties.  The details of the
            calculation set out in Subsection 4 of Section 5 of the Delegated
            Regulation 2015/35.  The value should be given as a percentage
            amount of the total net assets of the share class.  To obtain this
            figure, the values of the TPT's column “101_SCR_Mrkt_Prop weight
            over NAV” have to be summed up.  The correspondent Tripartite field
            is 101_SCR_Mrkt_Prop weight over NAV
        OFST500045:
          type: string
          description: >-
            Solvency Capital Requirement for the spread risk of bonds and
            loans.  The details of the calculation set out in Subsection 5 of
            Section 5 of the Delegated Regulation 2015/35.  The value should be
            given as a percentage amount of the total net assets of the share
            class.  To obtain this figure, the values of the TPT's column
            “102_SCR_Mrkt_Spread_bonds weight over NAV” have to be summed up. 
            The correspondent Tripartite field is 102_SCR_Mrkt_Spread_bonds
            weight over NAV
        OFST500050:
          type: string
          description: >-
            Solvency Capital Requirement for the spread risk of securitisation
            positions.  The details of the calculation set out in Subsection 5
            of Section 5 of the Delegated Regulation 2015/35.  The value should
            be given as a percentage amount of the total net assets of the share
            class.
             To obtain this figure, the values of the TPT's column “103_SCR_Mrkt_Spread_structured weight over NAV” have to be summed up.
              The correspondent Tripartite field is 103_SCR_Mrkt_Spread_structured weight over NAV
        OFST500055:
          type: string
          description: >-
            Solvency Capital Requirement for credit derivatives which is the
            result of an instantaneous increase of the credit spread of the
            underlying instruments.  The details of the calculation set out in
            Subsection 5 of Section 5 of the Delegated Regulation 2015/35.  The
            value should be given as a percentage amount of the total net assets
            of the share class.  To obtain this figure, the values of the TPT's
            column “104_SCR_Mrkt_Spread_derivatives_up weight over NAV” have to
            be summed up.  The correspondent Tripartite field is
            104_SCR_Mrkt_Spread_derivatives_up weight over NAV
        OFST500056:
          type: string
          description: >-
            Solvency Capital Requirement for credit derivatives which is the
            result of an instantaneous decrease of the credit spread of the
            underlying instruments.  The details of the calculation set out in
            Subsection 5 of Section 5 of the Delegated Regulation 2015/35.  The
            value should be given as a percentage amount of the total net assets
            of the share class.  To obtain this figure, the values of the TPT's
            column “105_SCR_Mrkt_Spread_derivatives_down weight over NAV” have
            to be summed up.  The correspondent Tripartite field is
            105_SCR_Mrkt_Spread_derivatives_down weight over NAV
        OFST500065:
          type: string
          description: >-
            Solvency Capital Requirement for the risk of an increase in value of
            the foreign currency against the local currency.  The details of the
            calculation set out in Subsection 7 of Section 5 of the Delegated
            Regulation 2015/35.  The value should be given as a percentage
            amount of the total net assets of the share class.  To obtain this
            figure, the values of the TPT's column “105a_SCR_Mrkt_FX_up weight
            over NAV” have to be summed up.  The correspondent Tripartite field
            is 105a_SCR_Mrkt_FX_up weight over NAV
        OFST500066:
          type: string
          description: >-
            Solvency Capital Requirement for the risk of a decrease in value of
            the foreign currency against the local currency.  The details of the
            calculation set out in Subsection 7 of Section 5 of the Delegated
            Regulation 2015/35.  The value should be given as a percentage
            amount of the total net assets of the share class.  To obtain this
            figure, the values of the TPT's column “105b_SCR_Mrkt_FX_down weight
            over NAV” have to be summed up.  The correspondent Tripartite field
            is 105b_SCR_Mrkt_FX_down weight over NAV
    SwissClimateScoreData:
