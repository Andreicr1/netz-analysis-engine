components:
  schemas:
    CumulativePerformanceData:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Request:
          $ref: '#/components/schemas/CumulativePerformanceData_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/CumulativePerformanceDataResult'
    CumulativePerformanceDataResult:
      type: object
      properties:
        Isin:
          type: string
        Apir:
          type: string
        instrumentCode:
          type: string
          description: >-
            The code for identifying the requested instrument (i.e. fund,
            sector, benchmark) on the FEfundinfo database Table or function is :
            input object; dbField Name is :-
        fundCitiCode:
          type: string
