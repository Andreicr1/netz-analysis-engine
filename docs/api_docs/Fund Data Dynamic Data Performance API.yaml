openapi: 3.0.0
info:
  title: Public Fund Data APIs - Dynamic Data - Performance
  description: >-
    Assess how funds perform over time with our Performance API, providing
    comprehensive insights and historical data.
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/funds/DynamicPerformance/1.0.0
    description: Production
security:
  - Production: []
paths:
  /CumulativePerformance:
    get:
      tags:
        - Dynamic Data Performance
      summary: >-
        Returns the cumulative performance data and the rankings over a group of
        pre-defined periods for the given instrument(s)(i.e. one or more funds,
        sectors and indexes). The performance figures are pre-calculated and
        updated at least once a day, overnight. The rankings (which are within a
        sector) are only valid for "Fund" instruments and are done at the fund
        level.
      description: >
        Use this end point to fetch cumlative performance Data based on the
        identifierType like citicodes, isins and apirs.
      operationId: GetCumlativePerformance
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes, isins and apirs.
          required: true
          style: form
          explode: true
          schema:
            type: string
            default: ''
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: PerformanceEndType
          in: query
          description: |
            Performace End Types:
             * `1` - DayEnd
             * `2` - MonthEnd
             * `3` - QuarterEnd
             * `4` - YearEnd
          required: true
          style: form
          explode: true
          schema:
            type: integer
            enum:
              - 1
              - 2
              - 3
              - 4
        - name: MethodType
          in: query
          description: |
            Performace Method Types:
             * `1` - BidToBid
             * `3` - OfferToBid
          required: true
          style: form
          explode: true
          schema:
            type: integer
            enum:
              - 1
              - 3
        - name: Currency
          in: query
          description: Value for currency. It will be default to GBP if nothing specified.
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: GBP
        - name: PriceType
          in: query
          description: |
            Performace Price Types:
             * `1` - NetTotalReturn
             * `2` - GrossTotalReturn
          required: true
          style: form
          explode: true
          schema:
            type: integer
            enum:
              - 1
              - 2
      responses:
        '200':
          description: Get Cumulative Performance Data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '206':
          description: Get Cumulative Performance Data. Partial Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this identifierValue.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Production:
            - dynamic-data-performance-read
        - Sandbox:
            - dynamic-data-performance-read
        - Development:
            - dynamic-data-performance-read
    post:
      tags:
        - Dynamic Data Performance
      summary: >-
        Returns the cumulative performance data and the rankings over a group of
        pre-defined periods for the given instrument(s)(i.e. one or more funds,
        sectors and indexes). The performance figures are pre-calculated and
        updated at least once a day, overnight. The rankings (which are within a
        sector) are only valid for "Fund" instruments and are done at the fund
        level.
      description: >
        Use this end point to fetch cumlative performance Data based on the
        identifierType like citicodes, isins and apirs.
      operationId: PostCumlativePerformance
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
