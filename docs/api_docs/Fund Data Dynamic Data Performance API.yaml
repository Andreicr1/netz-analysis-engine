          properties:
            IdentifierType:
              type: string
              description: >-
                Currently supported identifierTypes are citicodes, isins and
                apirs.
              default: ''
            Filters:
              $ref: '#/components/schemas/PostAnnualisedRequestBody_Filters'
    PostCalendarRequestBody:
      allOf:
        - $ref: '#/components/schemas/PostRequestBody'
        - type: object
          properties:
            IdentifierType:
              type: string
              description: >-
                Currently supported identifierTypes are citicodes, isins and
                apirs.
              default: ''
            Filters:
              $ref: '#/components/schemas/PostAnnualisedRequestBody_Filters'
    PostCumulativePerformanceRequestBody:
      allOf:
        - $ref: '#/components/schemas/PostRequestBody'
        - type: object
          properties:
            IdentifierType:
              type: string
              description: >-
                Currently supported identifierTypes are citicodes, isins and
                apirs.
              default: ''
            Filters:
              $ref: '#/components/schemas/PostAnnualisedRequestBody_Filters'
    PostDiscretePerformanceRequestBody:
      allOf:
        - $ref: '#/components/schemas/PostRequestBody'
        - type: object
          properties:
            IdentifierType:
              type: string
              description: >-
                Currently supported identifierTypes are citicodes, isins and
                apirs.
              default: ''
            Filters:
              $ref: '#/components/schemas/PostAnnualisedRequestBody_Filters'
    PostRequestBody:
      type: object
      properties:
        IdentifierValues:
          maxItems: 10
          minItems: 1
          uniqueItems: true
          type: array
          description: Provide identifier values. Provide maximum 10 values.
          items:
            type: string
        FieldSelections:
          uniqueItems: true
          type: array
          description: Provide the fields name to return in response
          items:
            type: string
            description: Field name
    ErrorResponse:
      type: object
      properties:
        Message:
          type: string
          description: response message
        IsSuccess:
          type: boolean
          description: based on the response value will be set.
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/ErrorItem'
    ErrorItem:
      type: object
    inline_response_200:
      anyOf:
        - $ref: '#/components/schemas/CumulativePerformanceData'
    inline_response_401:
      anyOf:
        - $ref: '#/components/schemas/ErrorResponse'
    inline_response_200_1:
      anyOf:
        - $ref: '#/components/schemas/AnnualizedData'
    inline_response_200_2:
      anyOf:
        - $ref: '#/components/schemas/CalendarData'
    inline_response_200_3:
      anyOf:
        - $ref: '#/components/schemas/DiscretePerformanceData'
    CumulativePerformanceData_Request:
      type: object
      properties:
        identifierType:
          type: string
        identifierValue:
          type: string
        PerformanceEndType:
          type: integer
        MethodType:
          type: integer
        Currency:
          type: string
        PriceType:
          type: integer
        fieldSelections:
          type: string
      description: It contains the request input data
    PostAnnualisedRequestBody_Filters:
      type: object
      properties:
        PerformanceEndType:
          type: integer
          description: |
            Performace End Types:
             * `1` - DayEnd
             * `2` - MonthEnd 
             * `3` - QuarterEnd
             * `4` - YearEnd 
          enum:
            - 1
            - 2
            - 3
            - 4
        MethodType:
          type: integer
          description: |
            Performace Method Types:
             * `1` - BidToBid
             * `3` - OfferToBid 
          enum:
            - 1
            - 3
        PriceType:
          type: integer
          description: |
            Performace Price Types:
             * `1` - NetTotalReturn
             * `2` - GrossTotalReturn 
          enum:
            - 1
            - 2
        Currency:
          type: string
          description: Value for currency. It will be default to GBP if nothing specified.
          default: GBP
  responses:
    '400':
      description: Bad request, Please check your inputs.
      content: {}
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/inline_response_401'
    '404':
      description: No data for this identifierValue.
      content: {}
    '408':
      description: Your request has timed out. Please try again.
      content: {}
    '500':
      description: >-
        Internal Server error, please raise a ticket with the FEFundinfo support
        team if you experience this.
      content: {}
  parameters:
    subscriptionHeaderParam:
      name: Fefi-Apim-Subscription-Key
      in: header
      description: Fefi APIM Subscription key
      required: true
      style: simple
      explode: false
      schema:
        type: string
        default: ''
    correlationIdParam:
      name: x-correlation-id
      in: header
      description: >-
        x-correlation-id is used to trace the log. It is unique guid id. API
        will generate new id if it is not passed explicitly.
      required: false
      style: simple
      explode: false
      schema:
        type: string
        default: ''
    identifierValueParam:
      name: identifierValue
      in: query
      description: Value for the identifier type. Provide maximum 10 values.
      required: true
      style: form
      explode: false
      schema:
        maxItems: 10
        minItems: 1
        uniqueItems: true
        type: array
        items:
          type: string
          default: ''
    fieldSelectionsParam:
      name: fieldSelections
      in: query
      description: Provide field names to filter in response.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          default: ''
  securitySchemes:
    Production:
      type: oauth2
      description: Using AAD to get an OAuth2 token for a registered app as a client.
      flows:
        clientCredentials:
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            dynamic-data-performance-read: Access to read dynamic performance data
        authorizationCode:
          authorizationUrl: https://auth.fefundinfo.com/connect/authorize
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            dynamic-data-performance-read: Access to read dynamic performance data
