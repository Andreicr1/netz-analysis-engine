openapi: 3.0.0
info:
  title: Public Fund Data APIs - Fund Ratios and Exposures API
  description: Public Fund Data APIs - Fund Ratios and Exposures API
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/funds/RatiosAndExposures/1.0.0
    description: Production
security:
  - Production: []
paths:
  /RatiosBreakdowns:
    get:
      tags:
        - Fund Ratios and Exposures Data
      summary: Holding breakdown data in Openfunds format
      description: >
        Use this end point to fetch Fund Ratios and Exposures data based on the
        identifierType like citicodes, isins and apirs.
      operationId: GetRatiosBreakdownsData
      parameters:
        - name: Fefi-Apim-Subscription-Key
          in: header
          description: Fefi APIM Subscription key
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: x-correlation-id
          in: header
          description: >-
            x-correlation-id is used to trace the log. It is unique guid id. API
            will generate new id if it is not passed explicitly.
          required: false
          style: simple
          explode: false
          schema:
            type: string
            default: ''
        - name: fieldSelections
          in: query
          description: Provide field names to filter in response.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              default: ''
        - name: identifierType
          in: query
          description: Currently supported identifierTypes are citicodes and isins.
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: identifierValue
          in: query
          description: Value for the identifier type. Provide maximum 10 values.
          required: true
          style: form
          explode: false
          schema:
            maxItems: 10
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: ''
        - name: BreakdownTypes
          in: query
          description: >-
            The type of breakdown to show mapping for: AS - asset class, AR -
            region, CP - capitalisation, CR - credit rating, CU - currency, FH -
            full holdings, HD - top 10 holdings, MP - maturity period, SC -
            sector, EB - Bond Sector, ES - Equity Sector Sector.
          required: true
          style: form
          explode: false
          schema:
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              default: HD
      responses:
        '200':
          description: Get Ratios breakdowns data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatiosBreakdownsData'
        '206':
          description: Get Ratios breakdowns data. Partial Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatiosBreakdownsData'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this identifierValue.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Production:
            - fund-ratios-exposure-read
        - Sandbox:
            - fund-ratios-exposure-read
        - Development:
            - fund-ratios-exposure-read
    post:
      tags:
        - Fund Ratios and Exposures Data
      summary: Holding breakdown data in Openfunds format
      description: >
        Use this end point to fetch Fund Ratios and Exposures data based on the
        identifierType like like citicodes, isins and apirs.
