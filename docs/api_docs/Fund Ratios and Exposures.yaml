          default: ''
  securitySchemes:
    Production:
      type: oauth2
      description: >-
        Using enterprise auth to get an OAuth2 token for a registered app as a
        client.
      flows:
        clientCredentials:
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            fund-ratios-exposure-read: Access to read Fund Ratios and Exposures data
        authorizationCode:
          authorizationUrl: https://auth.fefundinfo.com/connect/authorize
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            fund-ratios-exposure-read: Access to read Fund Ratios and Exposures data
