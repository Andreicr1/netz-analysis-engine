      description: It contains the request input data
  responses:
    '400':
      description: Bad request, Please check your inputs.
      content: {}
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/inline_response_401'
    '404':
      description: No data for this identifierValue.
      content: {}
    '408':
      description: Your request has timed out. Please try again.
      content: {}
    '500':
      description: >-
        Internal Server error, please raise a ticket with the FEFundinfo support
        team if you experience this.
      content: {}
  parameters:
    subscriptionHeaderParam:
      name: Fefi-Apim-Subscription-Key
      in: header
      description: Fefi APIM Subscription key
      required: true
      style: simple
      explode: false
      schema:
        type: string
        default: ''
    correlationIdParam:
      name: x-correlation-id
      in: header
      description: >-
        x-correlation-id is used to trace the log. It is unique guid id. API
        will generate new id if it is not passed explicitly.
      required: false
      style: simple
      explode: false
      schema:
        type: string
        default: ''
    identifierValueParam:
      name: identifierValue
      in: query
      description: Value for the identifier type. Provide maximum 10 values.
      required: true
      style: form
      explode: false
      schema:
        maxItems: 10
        minItems: 1
        uniqueItems: true
        type: array
        items:
          type: string
          default: ''
    fieldSelectionsParam:
      name: fieldSelections
      in: query
      description: Provide field names to filter in response.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          default: ''
  securitySchemes:
    Production:
      type: oauth2
      description: Using AAD to get an OAuth2 token for a registered app as a client.
      flows:
        clientCredentials:
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            static-key-facts-read: Access to read static-key-facts data
            sdr-read: Access to read SDR data
        authorizationCode:
          authorizationUrl: https://auth.fefundinfo.com/connect/authorize
          tokenUrl: https://auth.fefundinfo.com/connect/token
          scopes:
            static-key-facts-read: Access to read static-key-facts data
            sdr-read: Access to read SDR data
