openapi: 3.0.0
info:
  title: Public Fund Data APIs - Static Data - Key Facts API
  description: >-
    Quickly access essential information about funds, company, share classes and
    umbrella  with our Key Facts API
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/funds/StaticKeyFacts/1.0.0
