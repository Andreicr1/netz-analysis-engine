          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: currency
          in: query
          description: currency code
          required: true
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: Risk data for given isin and currency.
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
            x-request-id:
              $ref: '#/components/headers/x-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskDataResponse'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this input.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Development:
            - riskdata-read
        - Sandbox:
            - riskdata-read
        - Production:
            - riskdata-read
  /discreteperformance:
    get:
      tags:
        - Custom Data
      summary: >-
        Discrete performance and Rank data for the given instrument codes and
        specific currency
      description: >
        Returns discrete performance and Rank data available for the given
        instrument codes and for the specific currency
      operationId: customdata-discreteperformance
      parameters:
        - name: x-correlation-id
          in: header
          description: client correlation id to track the requests.
          required: false
          style: simple
          explode: false
          schema:
            type: string
        - name: instrumentcodes
          in: query
          description: >-
            The value can be set of ISINs and other codes like SectorCode,
            BenchmarkCode.
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: clientid
          in: query
          description: Client Id to fetch the data.
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: currency
          in: query
          description: currency code
          required: true
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            Discrete performance and Rank data for given instrument code and
            currency.
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
            x-request-id:
