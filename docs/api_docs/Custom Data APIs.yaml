  /ChartData:
    get:
      tags:
        - Custom Data
      summary: >-
        Performance chart data for Fund, Sector and Benchmark in a specified
        currency and a specified time period
      description: >
        Returns performance chart data for Fund, Sector and Benchmark in a
        specified currency and a specified time period.
      operationId: customdata-chartdata
      parameters:
        - name: x-correlation-id
          in: header
          description: client correlation id to track the requests.
          required: false
          style: simple
          explode: false
          schema:
            type: string
        - name: driverinstrument
          in: query
          description: ISIN value
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: additionalinstrument
          in: query
          description: The value can be set of codes like Isin, SectorCode, BenchmarkCode.
          required: false
          style: form
          explode: true
          schema:
            type: string
        - name: clientid
          in: query
          description: Client Id to fetch the data.
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: currency
          in: query
          description: currency code
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: period
          in: query
          description: time period
          required: true
          style: form
          explode: true
          schema:
            type: integer
            enum:
              - 3
              - 6
              - 12
              - 24
              - 36
              - 48
              - 60
        - name: fundtype
          in: query
          description: fundtype value can be set to either Primary or Non-Primary
          required: false
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            Performance chart data for given driver instrument and additional
            instrument codes, currency and period.
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
            x-request-id:
              $ref: '#/components/headers/x-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartDataResponse'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this input.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Development:
            - chartdata-read
        - Sandbox:
            - chartdata-read
        - Production:
            - chartdata-read
