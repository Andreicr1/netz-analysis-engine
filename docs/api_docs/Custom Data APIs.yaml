components:
  schemas:
    AdditionalInstrumentResponse:
      type: object
      properties:
        Request:
          $ref: '#/components/schemas/AdditionalInstrumentResponse_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/AdditionalInstrument'
      allOf:
        - $ref: '#/components/schemas/CommonResponseProperties'
    AdditionalInstrument:
      type: object
      properties:
        ClientId:
          type: string
        IsinCode:
          type: string
          example: US0378331005
        ShareClassName:
          type: string
          example: Class A
        FundType:
          type: string
          example: Non Primary
        BenchmarkCode:
          type: string
          example: S&P500
        BenchmarkName:
          type: string
          example: Standard & Poor's 500
        SectorCode:
          type: string
          example: FIN
        SectorName:
          type: string
          example: Financials
        CashPlusBenchmarkCode:
          type: string
        CashPlusBenchmarkName:
          type: string
        Currency:
          type: string
          example: USD
        LaunchDate:
          type: string
          format: date-time
          example: 2024-02-23T00:00:00.000Z
        IsHedgeFund:
          type: boolean
          example: true
    RiskDataResponse:
      type: object
      properties:
        Request:
          $ref: '#/components/schemas/RiskDataResponse_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/RiskData'
      allOf:
        - $ref: '#/components/schemas/CommonResponseProperties'
    RiskData:
      type: object
      properties:
        ClientId:
          type: string
        IsinCode:
          type: string
          example: US0378331005
        Currency:
          type: string
          example: USD
        AsAtDate:
          type: string
          format: date-time
          example: 2024-02-23T00:00:00.000Z
        JensenAlpha:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.052123
        Beta:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 1.034567
        Correlation:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.955678
        InfoRatio:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.324567
        Sharpe:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 1.456789
        TrackingError:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.234567
        RSquared:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.987654
        AnnualisedStandardDeviation:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.145678
        MaximumDrawdown:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: -0.123456
        VaRNormal95Percentage:
          pattern: ^\d{1,13}(\.\d{1,6})?$
          type: number
          format: double
          example: 0.056789
    DiscretePerformanceResponse:
      type: object
      properties:
        Request:
          $ref: '#/components/schemas/DiscretePerformanceResponse_Request'
        Result:
          type: array
          description: response result will be assign to result.
          items:
            $ref: '#/components/schemas/DiscretePerformance'
      allOf:
        - $ref: '#/components/schemas/CommonResponseProperties'
    DiscretePerformance:
      type: object
      properties:
        ClientId:
          type: string
          nullable: false
        InstrumentCode:
          type: string
          nullable: false
          example: US0378331005
        Currency:
          type: string
          nullable: true
          example: USD
        AsAtDate:
          type: string
          format: date-time
          nullable: false
          example: 2024-02-23T00:00:00.000Z
        P0t12m:
          pattern: ^\d{1,13}(\.\d{1,8})?$
          type: number
          format: double
          nullable: true
          example: 0.12323456
        P12t24m:
          pattern: ^\d{1,13}(\.\d{1,8})?$
          type: number
          format: double
          nullable: true
          example: 0.12323456
        P24t36m:
          pattern: ^\d{1,13}(\.\d{1,8})?$
          type: number
