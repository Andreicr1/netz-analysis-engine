openapi: 3.0.0
info:
  title: Custom Data APIs
  description: This section contains API's for the Custom Fund Data.
  version: 1.0.0
servers:
  - url: https://api.fefundinfo.com/customdata/1.0.0
    description: Production
security:
  - Production: []
paths:
  /additionalinstruments:
    get:
      tags:
        - Custom Data
      summary: List of Additional instruments
      description: |
        Returns the list of additional instruments
      operationId: customdata-additionalinstruments
      parameters:
        - name: x-correlation-id
          in: header
          description: client correlation id to track the requests.
          required: false
          style: simple
          explode: false
          schema:
            type: string
        - name: isincodes
          in: query
          description: One or more isin(s) to fetch the data.
          required: true
          style: form
          explode: true
          schema:
            type: string
        - name: clientid
          in: query
          description: Client Id to fetch the data.
          required: true
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: List of Additional Instruments.
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
            x-request-id:
              $ref: '#/components/headers/x-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalInstrumentResponse'
        '400':
          description: Bad request, Please check your inputs.
          content: {}
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_401'
        '404':
          description: No data for this input.
          content: {}
        '408':
          description: Your request has timed out. Please try again.
          content: {}
        '500':
          description: >-
            Internal Server error, please raise a ticket with the FEFundinfo
            support team if you experience this.
          content: {}
      security:
        - Development:
            - additional-instruments-read
        - Sandbox:
            - additional-instruments-read
        - Production:
            - additional-instruments-read
  /riskdata:
    get:
      tags:
