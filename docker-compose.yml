# Local development stack — mirrors Milestone 2 production:
# - PostgreSQL 16 + TimescaleDB + pgvector (timescale/timescaledb-ha:pg16)
# - Redis 7
# No Azure services needed for local development.
# Production: Timescale Cloud + Upstash Redis
#
# IMPORTANT: Use timescaledb-ha (not timescaledb) — the -ha variant bundles
# pgvector. The non-ha image lacks it and init_db.sql fails silently.
# After changing image for the first time:
#   docker-compose down -v && docker-compose up -d && make migrate
services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: netz
      POSTGRES_PASSWORD: password
      POSTGRES_DB: netz_engine
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netz -d netz_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
