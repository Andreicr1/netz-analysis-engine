<!doctype html>
<!-- data-theme="dark" is the SSR baseline. themeHook in hooks.server.ts replaces it. -->
<!-- Do NOT remove data-theme — it is the sentinel for transformPageChunk. -->
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<title>Netz Wealth OS</title>
		<script>
			// FOUC prevention — set theme before first paint
			(function() {
				var theme = localStorage.getItem('netz-theme');
				if (theme !== 'dark' && theme !== 'light') {
					// First-time visitor: respect OS preference, default to dark
					theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
				}
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
