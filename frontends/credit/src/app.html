<!doctype html>
<!-- data-theme="light" is the SSR baseline. themeHook in hooks.server.ts replaces it. -->
<!-- Do NOT remove data-theme — it is the sentinel for transformPageChunk. -->
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<title>Netz Credit Intelligence</title>
		<!-- FOUC prevention — external script to avoid CSP nonce/unsafe-inline conflicts -->
		<script src="%sveltekit.assets%/theme-init.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
