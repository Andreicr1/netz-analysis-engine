# Allocation Blocks: Geography × Asset Class → ETF Proxy Mapping
# Each block represents an investable segment in the model portfolio

blocks:
  # North America — Equity
  na_equity_large:
    geography: north_america
    asset_class: equity
    display_name: "North America Large Cap Equity"
    benchmark_ticker: SPY
    description: "US large-cap equity exposure via S&P 500"

  na_equity_growth:
    geography: north_america
    asset_class: equity
    display_name: "North America Growth Equity"
    benchmark_ticker: QQQ
    description: "US growth/technology exposure via NASDAQ-100"

  na_equity_value:
