# Governance Policy — Private Credit
# ===================================
# Seed data only. Runtime config lives in PostgreSQL (vertical_config_defaults).
# Loaded by migration 0007 and used as YAML fallback by ConfigService.
#
# Schema-free: values are flat scalars / lists (NOT nested ThresholdEntry dicts).
# ConfigService overlay via resolve_governance_policy() wraps each value into
# a ThresholdEntry with source="ConfigService" at runtime.
#
# List fields (board_override_triggers, watchlist_triggers) are REPLACED
# not merged by org-level overrides — consistent with ConfigService.deep_merge.

# ── Hard limits — Investment Policy s.4 ──────────────────────────────
single_manager_pct: 35.0
single_investment_pct: 35.0
single_sector_pct: 35.0
single_geography_pct: 40.0
top3_names_pct: 75.0
non_usd_unhedged_pct: 20.0
min_commingled_pct: 35.0
max_hard_lockup_pct: 10.0
max_lockup_years: 2.0
min_quarterly_liquidity_pct: 20.0

# ── Soft limits — Investment Policy s.5 ──────────────────────────────
max_leverage_underlying_pct: 300.0
min_manager_track_record_years: 2.0
min_manager_aum_usd: 100000000.0
max_manager_default_rate_pct: 10.0

# ── Governance rules ─────────────────────────────────────────────────
board_override_triggers:
  - single_manager
  - single_investment
  - hard_lockup
  - non_usd_unhedged

watchlist_triggers:
  - covenant_breach
  - payment_delay
  - cashflow_deterioration
  - valuation_markdown
  - legal_regulatory_event
  - structural_change_underlying

ic_approval_required_above_pct: 35.0
review_frequency_days: 90
