name: CI

on:
  pull_request:
  workflow_call:

jobs:
  # Detect which areas changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontends: ${{ steps.filter.outputs.frontends }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: filter
        run: |
          diff=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          backend=false; frontends=false
          echo "$diff" | grep -qE '^backend/|^pyproject\.toml' && backend=true
          echo "$diff" | grep -qE '^frontends/|^packages/|^pnpm-lock\.yaml' && frontends=true
          echo "$diff" | grep -qE '^\.github/' && backend=true && frontends=true
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontends=$frontends" >> "$GITHUB_OUTPUT"
          echo "backend=$backend frontends=$frontends"

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: netz
          POSTGRES_PASSWORD: password
          POSTGRES_DB: netz_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://netz:password@localhost:5432/netz_engine_test
      DATABASE_URL_SYNC: postgresql+psycopg://netz:password@localhost:5432/netz_engine_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=password psql -h localhost -U netz -d netz_engine_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install dependencies
        run: pip install -e ".[dev,ai,quant]"
      - name: Run migrations
        run: python -m alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://netz:password@localhost:5432/netz_engine_test
      - name: Lint
        run: python -m ruff check .
        working-directory: backend
      # Unit + route tests (~99% of the suite). Run in their own pytest
      # invocation so the SQLAlchemy module-level engine binds its asyncpg
      # pool to a single fresh event loop. Integration tests below run in
      # a separate invocation (separate Python process, separate engine,
      # separate pool) — that isolation prevents the "Future attached to a
      # different loop" cross-loop bug caused by some integration tests
      # using asyncio.run / loop.run_until_complete instead of pytest-asyncio.
      - name: Test (unit + routes)
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_macro_committee.py -m "not integration"
        working-directory: backend
      - name: Test (integration)
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_macro_committee.py -m "integration"
        working-directory: backend

  check-frontends:
    needs: changes
    if: needs.changes.outputs.frontends == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared UI packages
        run: pnpm --filter @netz/ui build && pnpm --filter @investintell/ui build && pnpm --filter @investintell/ii-terminal-core build
      - name: Sync SvelteKit generated types
        run: pnpm --filter "./frontends/*" exec svelte-kit sync
      # Strict gate: wealth + terminal must be green
      - name: Type-check wealth + terminal
        run: pnpm --filter netz-wealth-os --filter ii-terminal check
      # Credit has 40 pre-existing application-level type errors across 2 files
      # (null guards + untyped casts in pipeline/dealId views). Tracked in
      # issue #277. Non-blocking until that issue is resolved, after
      # which this step is merged back into the strict gate above.
      - name: Type-check credit (non-blocking — see issue #277)
        run: pnpm --filter netz-credit-intelligence check
        continue-on-error: true
      - name: Build all frontends
        run: pnpm --filter "./frontends/*" build
