name: CI

on:
  pull_request:
  workflow_call:

jobs:
  test-backend:
    runs-on: self-hosted

    env:
      DATABASE_URL: postgresql+asyncpg://netz:password@localhost:5432/netz_engine_test
      DATABASE_URL_SYNC: postgresql+psycopg://netz:password@localhost:5432/netz_engine_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development

    steps:
      - uses: actions/checkout@v4

      - name: Ensure test database exists
        run: |
          docker exec $(docker ps -q --filter ancestor=timescale/timescaledb:latest-pg16) psql -U netz -tc "SELECT 1 FROM pg_database WHERE datname='netz_engine_test'" | findstr "1" || docker exec $(docker ps -q --filter ancestor=timescale/timescaledb:latest-pg16) psql -U netz -c "CREATE DATABASE netz_engine_test"
        shell: cmd

      - name: Install dependencies
        run: pip install -e ".[dev,ai,quant]"

      - name: Run migrations
        run: python -m alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://netz:password@localhost:5432/netz_engine_test

      - name: Lint
        run: python -m ruff check .
        working-directory: backend

      - name: Test
        run: python -m pytest tests/ -v --tb=short
        working-directory: backend
