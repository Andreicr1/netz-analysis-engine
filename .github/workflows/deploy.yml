name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Detect what changed ─────────────────────────────────────────────
  changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      credit: ${{ steps.filter.outputs.credit }}
      wealth: ${{ steps.filter.outputs.wealth }}
      admin: ${{ steps.filter.outputs.admin }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: filter
        shell: pwsh
        run: |
          $diff = git diff --name-only HEAD~1 HEAD 2>$null
          if (-not $diff) { $diff = git diff --name-only HEAD }
          $ui = ($diff | Where-Object { $_ -match '^packages/ui/' }) -ne $null
          $backend = ($diff | Where-Object { $_ -match '^backend/' -or $_ -match '^pyproject.toml' }) -ne $null
          $credit = ($diff | Where-Object { $_ -match '^frontends/credit/' }) -ne $null -or $ui
          $wealth = ($diff | Where-Object { $_ -match '^frontends/wealth/' }) -ne $null -or $ui
          $admin = ($diff | Where-Object { $_ -match '^frontends/admin/' }) -ne $null -or $ui
          $infra = ($diff | Where-Object { $_ -match '^infra/' }) -ne $null
          $lockfile = ($diff | Where-Object { $_ -match '^pnpm-lock.yaml' }) -ne $null
          $ci = ($diff | Where-Object { $_ -match '^\.github/' }) -ne $null
          # CI/lockfile changes trigger everything
          if ($ci -or $lockfile) { $backend = $true; $credit = $true; $wealth = $true; $admin = $true; $infra = $true }
          echo "backend=$($backend.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "credit=$($credit.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "wealth=$($wealth.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "admin=$($admin.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "infra=$($infra.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          Write-Host "backend=$backend credit=$credit wealth=$wealth admin=$admin infra=$infra"

  # ── CI (only if backend changed) ────────────────────────────────────
  ci:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/ci.yml

  # ── Backend infra deploys ───────────────────────────────────────────
  deploy-backend:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/backend
        run: npm install
      - name: Deploy backend container
        working-directory: infra/cloudflare/backend
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-workers:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/workers
        run: npm install
      - name: Deploy workers container
        working-directory: infra/cloudflare/workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-gateway:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/gateway
        run: npm install
      - name: Deploy gateway worker
        working-directory: infra/cloudflare/gateway
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-cron:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/cron
        run: npm install
      - name: Deploy cron worker
        working-directory: infra/cloudflare/cron
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Frontend deploys (independent, only if their files changed) ─────
  deploy-credit:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.credit == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build credit frontend
        working-directory: frontends/credit
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/credit
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-credit --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-wealth:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.wealth == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build wealth frontend
        working-directory: frontends/wealth
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/wealth
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-wealth --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-admin:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.admin == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build admin frontend
        working-directory: frontends/admin
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/admin
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-admin --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
