name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Detect what changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      credit: ${{ steps.filter.outputs.credit }}
      wealth: ${{ steps.filter.outputs.wealth }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: filter
        run: |
          diff=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          backend=false; credit=false; wealth=false; admin=false
          echo "$diff" | grep -qE '^backend/|^pyproject\.toml' && backend=true
          ui=$(echo "$diff" | grep -qE '^packages/ui/' && echo true || echo false)
          echo "$diff" | grep -qE '^frontends/credit/' && credit=true
          echo "$diff" | grep -qE '^frontends/wealth/' && wealth=true
          echo "$diff" | grep -qE '^frontends/admin/' && admin=true
          [ "$ui" = "true" ] && credit=true && wealth=true && admin=true
          echo "$diff" | grep -qE '^\.github/|^pnpm-lock\.yaml' && credit=true && wealth=true && admin=true
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "credit=$credit" >> "$GITHUB_OUTPUT"
          echo "wealth=$wealth" >> "$GITHUB_OUTPUT"
          echo "admin=$admin" >> "$GITHUB_OUTPUT"
          echo "backend=$backend credit=$credit wealth=$wealth admin=$admin"

  # ── CI (only if backend changed) ────────────────────────────────────
  ci:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/ci.yml

  # ── Backend: deployed via Railway (auto-deploy on push to main) ────
  # Railway handles backend container deployment from Dockerfile

  # ── Frontend deploys (independent, only if their files changed) ─────
  deploy-credit:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.credit == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build credit frontend
        working-directory: frontends/credit
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/credit
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-credit --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-wealth:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.wealth == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build wealth frontend
        working-directory: frontends/wealth
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/wealth
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-wealth --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-admin:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.admin == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build admin frontend
        working-directory: frontends/admin
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/admin
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-admin --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
