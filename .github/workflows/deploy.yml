name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Detect what changed ─────────────────────────────────────────────
  changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      credit: ${{ steps.filter.outputs.credit }}
      wealth: ${{ steps.filter.outputs.wealth }}
      admin: ${{ steps.filter.outputs.admin }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: filter
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Git status check: $(git rev-parse --git-dir 2>&1)"
          $diff = git diff --name-only HEAD~1 HEAD 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "HEAD~1 failed, falling back to HEAD-only diff"
            $diff = git diff --name-only HEAD 2>&1
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WARNING: git diff failed — deploying everything"
            $diff = @()
            $backend = $true; $credit = $true; $wealth = $true; $admin = $true; $infra = $true
          } else {
            $diff = $diff -split "`n" | Where-Object { $_ -ne '' }
            Write-Host "Changed files: $($diff -join ', ')"
            $ui = [bool]($diff | Where-Object { $_ -match '^packages/ui/' })
            $backend = [bool]($diff | Where-Object { $_ -match '^backend/' -or $_ -match '^pyproject\.toml' })
            $credit = [bool]($diff | Where-Object { $_ -match '^frontends/credit/' }) -or $ui
            $wealth = [bool]($diff | Where-Object { $_ -match '^frontends/wealth/' }) -or $ui
            $admin = [bool]($diff | Where-Object { $_ -match '^frontends/admin/' }) -or $ui
            $infra = [bool]($diff | Where-Object { $_ -match '^infra/' })
            $lockfile = [bool]($diff | Where-Object { $_ -match '^pnpm-lock\.yaml' })
            $ci = [bool]($diff | Where-Object { $_ -match '^\.github/' })
            if ($ci -or $lockfile) { $backend = $true; $credit = $true; $wealth = $true; $admin = $true; $infra = $true }
          }
          echo "backend=$("$backend".ToLower())" >> $env:GITHUB_OUTPUT
          echo "credit=$("$credit".ToLower())" >> $env:GITHUB_OUTPUT
          echo "wealth=$("$wealth".ToLower())" >> $env:GITHUB_OUTPUT
          echo "admin=$("$admin".ToLower())" >> $env:GITHUB_OUTPUT
          echo "infra=$("$infra".ToLower())" >> $env:GITHUB_OUTPUT
          Write-Host "backend=$backend credit=$credit wealth=$wealth admin=$admin infra=$infra"

  # ── CI (only if backend changed) ────────────────────────────────────
  ci:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/ci.yml

  # ── Backend infra deploys ───────────────────────────────────────────
  deploy-backend:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/backend
        run: npm install
      - name: Deploy backend container
        working-directory: infra/cloudflare/backend
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-workers:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/workers
        run: npm install
      - name: Deploy workers container
        working-directory: infra/cloudflare/workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-gateway:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/gateway
        run: npm install
      - name: Deploy gateway worker
        working-directory: infra/cloudflare/gateway
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-cron:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.infra == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        working-directory: infra/cloudflare/cron
        run: npm install
      - name: Deploy cron worker
        working-directory: infra/cloudflare/cron
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Frontend deploys (independent, only if their files changed) ─────
  deploy-credit:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.credit == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          clean: true
      - name: Clean stale node_modules
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build credit frontend
        working-directory: frontends/credit
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/credit
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-credit --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-wealth:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.wealth == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          clean: true
      - name: Clean stale node_modules
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build wealth frontend
        working-directory: frontends/wealth
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/wealth
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-wealth --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-admin:
    needs: [changes, ci]
    if: always() && needs.changes.outputs.admin == 'true' && (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          clean: true
      - name: Clean stale node_modules
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build @netz/ui
        run: pnpm --filter @netz/ui build
      - name: Build admin frontend
        working-directory: frontends/admin
        run: pnpm build
        env:
          PUBLIC_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages
        working-directory: frontends/admin
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=netz-admin --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
