name: Deploy to Cloudflare

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # CI must pass before deploy (reuses existing ci.yml)
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build container image
        working-directory: infra/cloudflare
        run: wrangler containers build . --tag netz-backend:${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Push to Cloudflare registry
        run: wrangler containers push netz-backend:${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-gateway:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        working-directory: infra/cloudflare/gateway
        run: npm install
      - name: Deploy gateway worker
        working-directory: infra/cloudflare/gateway
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-cron:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        working-directory: infra/cloudflare/cron
        run: npm install
      - name: Deploy cron worker
        working-directory: infra/cloudflare/cron
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # Frontends: deployed via Cloudflare Pages Git integration (auto-deploy on push).
  # Each Pages project is configured in the Cloudflare Dashboard with:
  #   Build command:  cd frontends/<app> && pnpm install && pnpm build
  #   Build output:   frontends/<app>/.svelte-kit/cloudflare
